<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ProtoCall Trainer — CrewTable</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icon.svg">
<meta name="theme-color" content="#020617">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="/socket.io/socket.io.js"></script>
<style>
  html{background:#020617}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
  .tap{min-width:48px;min-height:48px}
  @keyframes pulse-live{0%,100%{opacity:1}50%{opacity:.4}}
  .live-dot{animation:pulse-live 1.6s infinite}
  @keyframes slide-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .anim-in{animation:slide-in .3s ease-out}
  @keyframes flash-push{0%{background:#9f1239}100%{background:#1e293b}}
  .pushed-flash{animation:flash-push 1.2s ease-out}
</style>
</head>
<body class="bg-slate-950 text-slate-100 antialiased min-h-screen">

<nav class="sticky top-0 z-40 bg-slate-900/95 backdrop-blur border-b border-slate-800 px-4 py-2.5 flex items-center justify-between">
  <a href="#/" class="flex items-center gap-2">
    <i data-lucide="flame" class="w-6 h-6 text-rose-600"></i>
    <span class="font-bold tracking-tight">ProtoCall<span class="text-rose-500">Trainer</span></span>
  </a>
  <div id="nav-right" class="flex items-center gap-1"></div>
</nav>

<div id="app"></div>
<div id="toast" class="fixed top-16 left-1/2 -translate-x-1/2 z-50 bg-emerald-600 text-white px-5 py-3 rounded-xl font-semibold shadow-xl hidden anim-in"></div>

<script>
const $ = sel => document.querySelector(sel);
const app = $('#app');
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function toast(msg, color) {
  const t = $('#toast');
  t.textContent = msg;
  t.className = t.className.replace(/bg-\S+/, color || 'bg-emerald-600');
  t.classList.remove('hidden');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.add('hidden'), 2500);
}
function icons(){ lucide.createIcons(); }
const token = localStorage.pcToken || (localStorage.pcToken = crypto.randomUUID());

let socket = null;
function getSocket() {
  if (!socket) socket = io();
  return socket;
}
function leaveSocket() {
  if (socket) { socket.removeAllListeners(); socket.disconnect(); socket = null; }
}

/* ═══ Router ═══ */
const routes = {
  '': renderLanding,
  'library': renderLibrary,
  'create': id => renderCreator(id),
  'host': code => renderHost(code),
  'join': code => renderJoin(code),
  'login': () => renderAuth('login'),
  'signup': () => renderAuth('signup'),
  'verify': token => renderVerify(token),
  'reset': token => renderReset(token),
  'me': renderMe,
  'public': renderPublic,
  'session': id => renderSessionDetail(id),
  'scenario': id => renderScenarioDetail(id),
  'solo': id => renderSolo(id),
  'coverage': renderCoverage,
  'department': renderDepartment,
  'moderation': renderModeration,
};
function route() {
  leaveSocket();
  const [name, arg] = location.hash.replace(/^#\//, '').split('?')[0].split('/');
  (routes[name] || renderLanding)(arg);
}
window.addEventListener('hashchange', route);

/* ═══ Landing ═══ */
function renderLanding() {
  app.innerHTML = `
  <main class="max-w-md mx-auto p-6 pt-14 space-y-6 anim-in">
    <div class="text-center space-y-2">
      <i data-lucide="flame" class="w-14 h-14 text-rose-600 mx-auto"></i>
      <h1 class="text-3xl font-black">CrewTable</h1>
      <p class="text-slate-400">Live tactical fireground & EMS scenario training</p>
    </div>
    <div class="bg-slate-800 rounded-2xl p-5 space-y-3">
      <label class="text-sm font-semibold text-slate-300">Join a live session</label>
      <div class="flex gap-2">
        <input id="join-code" placeholder="ROOM CODE e.g. FIRE-4821" class="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 uppercase font-mono tracking-wider focus:border-amber-500 focus:outline-none">
        <button id="join-btn" class="tap bg-rose-600 hover:bg-rose-500 rounded-xl px-5 font-bold">Join</button>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-3">
      <a href="#/library" class="tap bg-slate-800 hover:bg-slate-700 rounded-2xl p-5 text-center space-y-2">
        <i data-lucide="radio-tower" class="w-7 h-7 mx-auto text-emerald-400"></i>
        <p class="font-semibold text-sm">Host a Session</p>
      </a>
      <a href="#/create" class="tap bg-slate-800 hover:bg-slate-700 rounded-2xl p-5 text-center space-y-2">
        <i data-lucide="square-pen" class="w-7 h-7 mx-auto text-amber-400"></i>
        <p class="font-semibold text-sm">Build a Scenario</p>
      </a>
    </div>
  </main>`;
  icons();
  const go = () => {
    const code = $('#join-code').value.trim().toUpperCase();
    if (code) location.hash = '#/join/' + code;
  };
  $('#join-btn').onclick = go;
  $('#join-code').addEventListener('keydown', e => e.key === 'Enter' && go());
}

/* ═══ Library ═══ */
async function renderLibrary() {
  const scenarios = await fetch('/api/scenarios').then(r => r.json());
  app.innerHTML = `
  <main class="max-w-2xl mx-auto p-4 sm:p-6 space-y-4 anim-in">
    <div class="flex items-center justify-between">
      <h1 class="text-2xl font-bold">Scenario Library</h1>
      <a href="#/create" class="tap flex items-center gap-1.5 text-sm bg-rose-600 hover:bg-rose-500 px-4 py-2.5 rounded-xl font-medium"><i data-lucide="plus" class="w-4 h-4"></i>New</a>
    </div>
    ${me ? '' : `<div class="bg-amber-950/40 border border-amber-800/50 rounded-xl p-4 text-sm text-amber-100 flex items-center gap-3">
      <i data-lucide="log-in" class="w-5 h-5 text-amber-400 shrink-0"></i>
      <span><a href="#/login" class="font-bold text-amber-300 hover:underline">Log in</a> to host live sessions and build your own scenarios. Joining a room never needs an account.</span>
    </div>`}
    ${scenarios.filter(s => !s.deleted_at).map(s => `
    <div class="bg-slate-800 rounded-2xl p-5 flex flex-col sm:flex-row sm:items-center gap-4 ${s.is_official ? 'ring-1 ring-emerald-600/60' : ''}">
      <div class="flex-1">
        <p class="font-bold flex items-center gap-2 flex-wrap">${esc(s.title)}
          ${s.is_official ? '<span class="text-[10px] font-black tracking-wider bg-emerald-600 px-2 py-0.5 rounded-full flex items-center gap-1"><i data-lucide="shield-check" class="w-3 h-3"></i>OFFICIAL PROTOCOL</span>' : ''}
          ${s.visibility === 'department' && !s.is_official ? '<span class="text-[10px] font-bold tracking-wider bg-slate-700 text-emerald-300 px-2 py-0.5 rounded-full">DEPARTMENT</span>' : ''}</p>
        <p class="text-sm text-slate-400 mt-0.5">${esc(s.category)} · ${esc(s.subcategory)} · ${s.question_count} questions</p>
      </div>
      <button data-launch="${s.id}" class="tap bg-emerald-600 hover:bg-emerald-500 rounded-xl px-5 py-3 font-bold text-sm flex items-center justify-center gap-2 shrink-0">
        <i data-lucide="radio-tower" class="w-4 h-4"></i>Launch Live
      </button>
    </div>`).join('') || '<p class="text-slate-500 italic">No scenarios yet.</p>'}
  </main>`;
  icons();
  bindLaunchButtons();
}

/* ═══ Creator ═══ */
const SUBCATS = {
  'Fireground': ['Residential','Commercial','Wildland','High-Rise'],
  'EMS': ['Cardiac','Trauma','Pediatric','Medical'],
  'Motor Vehicle Accidents': ['Extrication','Rollover','Hazardous Materials'],
};
let draftQs = [], draftVis = 'private', draftMedia = [], editingId = null;
async function renderCreator(id) {
  if (!me) { sessionStorage.authNext = location.hash; location.hash = '#/login'; return; }
  editingId = id || null;
  draftQs = [{ prompt: '', kind: 'text', choices: null, instructor_answer: '', role_track: '' }];
  draftMedia = [];
  let existing = null;
  const objectives = await fetch('/api/objectives').then(r => r.json()).catch(() => []);
  if (editingId) {
    const res = await fetch(`/api/scenarios/${editingId}`);
    existing = res.ok ? await res.json() : null;
    if (!existing?.mine) { toast('Scenario not found', 'bg-rose-600'); location.hash = '#/me'; return; }
    draftQs = existing.questions.map(q => ({ id: q.id, prompt: q.prompt, kind: q.kind, choices: q.choices, instructor_answer: q.instructor_answer, role_track: q.role_track }));
    draftMedia = existing.media.map(m => ({ kind: m.kind, url: m.url }));
  }
  app.innerHTML = `
  <main class="max-w-3xl mx-auto p-4 sm:p-6 space-y-5 anim-in">
    <h1 class="text-2xl font-bold">${editingId ? 'Edit Scenario' : 'Scenario Creator'}</h1>
    <section class="bg-slate-800 rounded-2xl p-4 sm:p-6 space-y-4">
      <div><label class="text-sm font-medium text-slate-300">Title</label>
        <input id="c-title" class="mt-1 w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:border-rose-500 focus:outline-none"></div>
      <div><label class="text-sm font-medium text-slate-300">Dispatch / Description</label>
        <textarea id="c-desc" rows="3" class="mt-1 w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:border-rose-500 focus:outline-none"></textarea></div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div><label class="text-sm font-medium text-slate-300">Category</label>
          <select id="c-cat" class="mt-1 w-full tap bg-slate-900 border border-slate-700 rounded-xl px-4 py-3">
            ${Object.keys(SUBCATS).map(c => `<option>${c}</option>`).join('')}</select></div>
        <div><label class="text-sm font-medium text-slate-300">Subcategory</label>
          <select id="c-sub" class="mt-1 w-full tap bg-slate-900 border border-slate-700 rounded-xl px-4 py-3"></select></div>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div><label class="text-sm font-medium text-slate-300">Primary learning objective</label>
          <select id="c-obj1" class="mt-1 w-full tap bg-slate-900 border border-slate-700 rounded-xl px-4 py-3">
            <option value="">— none —</option>${objectives.map(o => `<option>${esc(o)}</option>`).join('')}</select></div>
        <div><label class="text-sm font-medium text-slate-300">Secondary objective <span class="text-slate-500">(optional)</span></label>
          <select id="c-obj2" class="mt-1 w-full tap bg-slate-900 border border-slate-700 rounded-xl px-4 py-3">
            <option value="">— none —</option>${objectives.map(o => `<option>${esc(o)}</option>`).join('')}</select></div>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <div><label class="text-sm font-medium text-slate-300">Difficulty</label>
          <select id="c-diff" class="mt-1 w-full tap bg-slate-900 border border-slate-700 rounded-xl px-4 py-3">
            <option value="">— unset —</option><option>Introductory</option><option>Standard</option><option>Advanced</option></select></div>
        <div><label class="text-sm font-medium text-slate-300">Duration <span class="text-slate-500">(min)</span></label>
          <input id="c-dur" type="number" min="1" class="mt-1 w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:border-rose-500 focus:outline-none"></div>
        <div><label class="text-sm font-medium text-slate-300">Building type</label>
          <input id="c-bldg" placeholder="e.g. Strip mall" class="mt-1 w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:border-rose-500 focus:outline-none"></div>
      </div>
      <div>
        <label class="text-sm font-medium text-slate-300">Media <span class="text-slate-500">(photo · EKG strip · map)</span></label>
        <div id="c-media" class="mt-2 space-y-2"></div>
        <label class="mt-2 tap flex items-center justify-center gap-2 border-2 border-dashed border-slate-600 rounded-xl p-5 text-slate-400 hover:border-amber-500 hover:text-amber-400 cursor-pointer transition">
          <i data-lucide="image-plus" class="w-5 h-5"></i><span id="c-upload-label">Upload image</span>
          <input id="c-file" type="file" accept="image/png,image/jpeg,image/webp,image/gif" class="hidden">
        </label>
      </div>
    </section>
    <section class="bg-slate-800 rounded-2xl p-4 sm:p-6 space-y-3">
      <div class="flex items-center justify-between">
        <h2 class="font-semibold">Questions</h2>
        <button id="c-addq" class="tap flex items-center gap-1.5 text-sm bg-rose-600 hover:bg-rose-500 px-4 py-2.5 rounded-xl font-medium"><i data-lucide="plus" class="w-4 h-4"></i>Add</button>
      </div>
      <div id="c-qs" class="space-y-3"></div>
    </section>
    <section class="bg-slate-800 rounded-2xl p-4 sm:p-6 space-y-3">
      <div>
        <p class="font-medium">Visibility</p>
        <p class="text-sm text-slate-400" id="vis-hint"></p>
      </div>
      <div id="vis-seg" class="grid ${me?.department ? 'grid-cols-3' : 'grid-cols-2'} gap-2"></div>
    </section>
    <button id="c-save" class="tap w-full bg-emerald-600 hover:bg-emerald-500 rounded-2xl py-4 font-bold text-lg flex items-center justify-center gap-2">
      <i data-lucide="save" class="w-5 h-5"></i>Save to Library</button>
  </main>`;
  const fillSub = () => $('#c-sub').innerHTML = SUBCATS[$('#c-cat').value].map(s => `<option>${s}</option>`).join('');
  $('#c-cat').onchange = fillSub; fillSub();
  if (existing) {
    $('#c-title').value = existing.title;
    $('#c-desc').value = existing.description;
    $('#c-cat').value = existing.category; fillSub();
    $('#c-sub').value = existing.subcategory;
    $('#c-obj1').value = existing.objective_primary ?? '';
    $('#c-obj2').value = existing.objective_secondary ?? '';
    $('#c-diff').value = existing.difficulty ?? '';
    $('#c-dur').value = existing.duration_min ?? '';
    $('#c-bldg').value = existing.building_type ?? '';
  }
  $('#c-addq').onclick = () => { draftQs.push({ prompt: '', kind: 'text', choices: null, instructor_answer: '', role_track: '' }); drawQs(); };
  const VIS = [
    ['private', 'Private', 'Only you can see and launch it'],
    ...(me?.department ? [['department', 'Department', `Every member of ${me.department.name} can train on it; your chief can mark it Official Protocol`]] : []),
    ['public', 'Public', 'Shared with the whole community library'],
  ];
  draftVis = existing?.visibility ?? 'private';
  if (draftVis === 'department' && !me?.department) draftVis = 'private';
  const applyVis = () => {
    $('#vis-seg').innerHTML = VIS.map(([v, label]) => `
      <button data-vis="${v}" class="tap py-3 rounded-xl text-sm font-semibold ${draftVis === v
        ? (v === 'public' ? 'bg-rose-600' : v === 'department' ? 'bg-emerald-600' : 'bg-slate-600')
        : 'bg-slate-900 border border-slate-700 hover:border-slate-500'}">${label}</button>`).join('');
    $('#vis-hint').textContent = VIS.find(([v]) => v === draftVis)[2];
    $('#vis-seg').querySelectorAll('[data-vis]').forEach(b => b.onclick = () => { draftVis = b.dataset.vis; applyVis(); });
  };
  applyVis();
  $('#c-file').onchange = async () => {
    const file = $('#c-file').files[0];
    if (!file) return;
    $('#c-upload-label').textContent = 'Uploading…';
    const form = new FormData();
    form.append('file', file);
    const res = await fetch('/api/media', { method: 'POST', body: form });
    $('#c-upload-label').textContent = 'Upload image';
    $('#c-file').value = '';
    if (!res.ok) { toast((await res.json()).error || 'Upload failed', 'bg-rose-600'); return; }
    draftMedia.push({ kind: 'photo', url: (await res.json()).url });
    drawMedia();
  };
  $('#c-save').onclick = saveScenario;
  drawQs(); drawMedia(); icons();
}
function drawMedia() {
  $('#c-media').innerHTML = draftMedia.map((m, i) => `
    <div class="flex items-center gap-3 bg-slate-900 border border-slate-700 rounded-xl p-2">
      <img src="${esc(m.url)}" class="w-16 h-16 object-cover rounded-lg bg-slate-800">
      <select data-mkind="${i}" class="tap bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm">
        ${['photo', 'ekg', 'map'].map(k => `<option value="${k}" ${m.kind === k ? 'selected' : ''}>${k === 'ekg' ? 'EKG strip' : k}</option>`).join('')}
      </select>
      <button data-mdel="${i}" class="tap ml-auto text-slate-400 hover:text-rose-400 px-3"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
    </div>`).join('');
  $('#c-media').querySelectorAll('[data-mkind]').forEach(el => el.onchange = () => draftMedia[el.dataset.mkind].kind = el.value);
  $('#c-media').querySelectorAll('[data-mdel]').forEach(el => el.onclick = () => { draftMedia.splice(el.dataset.mdel, 1); drawMedia(); });
  icons();
}
function drawQs() {
  $('#c-qs').innerHTML = draftQs.map((q, i) => `
  <div class="bg-slate-900 border border-slate-700 rounded-xl p-4 space-y-3">
    <div class="flex items-center justify-between gap-2 flex-wrap">
      <input data-f="role_track" data-i="${i}" value="${esc(q.role_track)}" placeholder="Role track (e.g. Firefighter)" class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-xs w-52">
      <div class="flex items-center gap-1 bg-slate-800 rounded-lg p-1 text-xs">
        <button data-kind="text" data-i="${i}" class="px-3 py-1.5 rounded-md ${q.kind==='text'?'bg-amber-600 font-semibold':''}">Text Box</button>
        <button data-kind="multiple_choice" data-i="${i}" class="px-3 py-1.5 rounded-md ${q.kind==='multiple_choice'?'bg-amber-600 font-semibold':''}">Multiple Choice</button>
      </div>
    </div>
    <textarea data-f="prompt" data-i="${i}" rows="2" placeholder="Question prompt…" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm">${esc(q.prompt)}</textarea>
    ${q.kind==='multiple_choice' ? `<input data-f="choicesRaw" data-i="${i}" value="${esc((q.choices||[]).join(' | '))}" placeholder="Choices separated by | " class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm">` : ''}
    <div><label class="text-xs font-semibold text-emerald-400">Instructor Answer</label>
      <textarea data-f="instructor_answer" data-i="${i}" rows="2" class="mt-1 w-full bg-slate-800 border border-emerald-900 rounded-lg px-3 py-2 text-sm text-emerald-100">${esc(q.instructor_answer)}</textarea></div>
  </div>`).join('');
  $('#c-qs').querySelectorAll('[data-f]').forEach(el => el.onchange = () => {
    const q = draftQs[el.dataset.i];
    if (el.dataset.f === 'choicesRaw') q.choices = el.value.split('|').map(s => s.trim()).filter(Boolean);
    else q[el.dataset.f] = el.value;
  });
  $('#c-qs').querySelectorAll('[data-kind]').forEach(el => el.onclick = () => {
    draftQs[el.dataset.i].kind = el.dataset.kind; drawQs();
  });
  icons();
}
async function saveScenario() {
  const body = {
    title: $('#c-title').value.trim(), description: $('#c-desc').value.trim(),
    category: $('#c-cat').value, subcategory: $('#c-sub').value,
    visibility: draftVis,
    objective_primary: $('#c-obj1').value, objective_secondary: $('#c-obj2').value,
    difficulty: $('#c-diff').value,
    duration_min: $('#c-dur').value ? parseInt($('#c-dur').value, 10) : null,
    building_type: $('#c-bldg').value.trim(),
    questions: draftQs.filter(q => q.prompt.trim()),
    media: draftMedia,
  };
  if (!body.title) return toast('Title is required', 'bg-amber-500');
  if (body.objective_secondary && !body.objective_primary)
    return toast('Pick a primary objective first', 'bg-amber-500');
  if (body.objective_secondary && body.objective_secondary === body.objective_primary)
    return toast('Objectives must differ', 'bg-amber-500');
  const res = await fetch(editingId ? `/api/scenarios/${editingId}` : '/api/scenarios', {
    method: editingId ? 'PUT' : 'POST',
    headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
  });
  if (res.ok) { toast(editingId ? 'Scenario updated' : 'Scenario saved'); location.hash = '#/me'; }
  else toast('Save failed', 'bg-rose-600');
}

/* ═══ Host Control Room ═══ */
function renderHost(code) {
  const s = getSocket();
  s.on('response_incoming', r => { if (hostState) { hostState.responses.push(r); drawMatrix(); } });
  s.on('answer_pushed', r => {
    if (!hostState) return;
    const found = hostState.responses.find(x => x.id === r.id);
    if (found) found.is_pushed = 1;
    drawMatrix();
  });
  s.on('participant_count', n => { const el = $('#pcount'); if (el) el.textContent = Math.max(0, n - 1); });
  s.emit('join_room', { code, role: 'host' }, ({ error, state }) => {
    if (error) { toast(error, 'bg-rose-600'); location.hash = '#/library'; return; }
    drawHost(state);
  });
}
let hostState = null;
function drawHost(state) {
  hostState = state;
  const { session } = state;
  app.innerHTML = `
  <main class="p-4 sm:p-6 max-w-7xl mx-auto anim-in">
    <div class="flex flex-col lg:flex-row gap-5">
      <aside class="lg:w-[30%] space-y-4">
        <div class="bg-slate-800 rounded-2xl p-5">
          <div id="live-flag" class="flex items-center gap-2 text-emerald-400 text-sm font-semibold mb-2">
            <span class="w-2.5 h-2.5 bg-emerald-500 rounded-full live-dot"></span> LIVE SESSION</div>
          <h1 class="font-bold text-lg leading-snug">${esc(session.title)}</h1>
          <p class="text-sm text-slate-400 mt-1">${esc(session.category)} · ${esc(session.subcategory)}</p>
        </div>
        <div class="bg-slate-800 rounded-2xl p-5 text-center">
          <p class="text-sm text-slate-400 mb-1">Room Code</p>
          <p class="text-4xl font-black tracking-widest text-amber-400">${esc(session.room_code)}</p>

const answered = new Set(); // question_ids this participant submitted

function renderJoin(code) {
  const s = getSocket();
  ['answer_pushed','session_ended','disconnect'].forEach(ev => s.off(ev));
  s.on('answer_pushed', r => {
      const slot = document.getElementById('pushed-' + r.question_id);
      if (!slot || slot.querySelector(`[data-rid="${r.id}"]`)) return;
      const d = document.createElement('div');

      d.innerHTML = `<p class="text-xs font-bold text-rose-400 mb-0.5 flex items-center gap-1"><i data-lucide="megaphone" class="w-3.5 h-3.5"></i>PUSHED BY INSTRUCTOR · ${esc(r.display_tag)}</p>${esc(r.body)}`;

  });
  s.on('session_ended', () => {
    if (pState) pState.session.status = 'ended';
    renderJoin(code); // rejoin: session end unlocks all official answers (PRD-v7)
    const b = $('#conn-badge');
    if (b) { b.innerHTML = '<span class="w-2 h-2 bg-slate-500 rounded-full"></span> ENDED'; b.className = 'flex items-center gap-1.5 text-xs font-semibold bg-slate-800 text-slate-400 px-3 py-1.5 rounded-full'; }
    if (me) toast('Session saved to your Completed Library');
    else $('#guest-drawer')?.classList.remove('hidden');
  });
  let joinedOnce = false;
  s.off('connect');
  s.on('connect', () => { if (joinedOnce) renderJoin(code); }); // any reconnect → full rejoin + queue flush
  s.on('disconnect', () => {
    const b = $('#conn-badge');
    if (b && pState?.session.status === 'live') { b.innerHTML = 'RECONNECTING…'; b.className = 'text-xs font-semibold bg-amber-900/60 text-amber-300 px-3 py-1.5 rounded-full'; }
  });
  const savedRole = sessionStorage['pcRole:' + code] ?? '';
  s.emit('join_room', { code, token, role: 'participant', role_track: savedRole === 'ALL' ? '' : savedRole }, ({ error, state, participant }) => {
    if (error) { toast(error, 'bg-rose-600'); location.hash = '#/'; return; }
    joinedOnce = true;
    // v7 role overlay: tracked scenario + no role picked yet → choose a seat first
    if (state.tracks?.length && !participant.role_track && savedRole !== 'ALL'
        && !state.responses.some(r => r.participant_id === participant.id)) {

      return;
    }
    pState = state; myId = participant.id; myRole = participant.role_track;
    answered.clear(); official.clear();
    state.responses.filter(r => r.participant_id === myId).forEach(r => answered.add(r.question_id));
    if (state.answers_revealed) state.questions.forEach(q => official.set(q.id, q.instructor_answer ?? ''));
    drawParticipant();
    flushQueue();
  });
}

/* ─── Offline answer queue: queued in localStorage, flushed on rejoin ─── */
const queuedAnswers = new Map(); // question_id -> body (current room)
const readQueue = () => { try { return JSON.parse(localStorage.pcQueue || '{}'); } catch { return {}; } };
function queuePut(code, qid, body) {
  const q = readQueue();
  (q[code] ??= []).push({ question_id: qid, body });
  localStorage.pcQueue = JSON.stringify(q);
  queuedAnswers.set(qid, body);
}
function queueRemove(code, qid) {
  const q = readQueue();
  q[code] = (q[code] || []).filter(x => x.question_id !== qid);
  if (!q[code].length) delete q[code];
  localStorage.pcQueue = JSON.stringify(q);
  queuedAnswers.delete(qid);
}

function applySubmitSuccess(qid, body, res) {
  answered.add(qid);
  pState.responses.push({ id: 'local-' + qid, question_id: qid, participant_id: myId, body, is_pushed: 0 });
  if (res?.complete && res.official_answers)
    Object.entries(res.official_answers).forEach(([id, a]) => official.set(id, a));
  drawParticipant();
  return !!res?.complete;
}

function sendResponse(qid, val) {
  const code = pState.session.room_code;
  getSocket().timeout(5000).emit('submit_response', { question_id: qid, body: val }, (err, res) => {
    if (err) { // socket down or server unreachable — hold it locally
      queuePut(code, qid, val);
      drawParticipant();
      toast('Offline — answer queued, sends when you reconnect', 'bg-amber-500');
      return;
    }
    if (res?.error) return toast('Submit failed', 'bg-rose-600');
    const complete = applySubmitSuccess(qid, val, res);
    toast(complete ? 'All answered — Official Answers unlocked' : 'Submitted');
  });
}

function flushQueue() {
  const code = pState.session.room_code;
  const items = readQueue()[code] || [];
  queuedAnswers.clear();
  items.forEach(it => queuedAnswers.set(it.question_id, it.body));
  items.forEach(it => {
    // skip anything the server already has (e.g. flushed from another tab)
    if (pState.responses.some(r => r.participant_id === myId && r.question_id === it.question_id)) {
      queueRemove(code, it.question_id);
      return;
    }
    getSocket().timeout(5000).emit('submit_response', { question_id: it.question_id, body: it.body }, (err, res) => {
      if (err || res?.error) return; // still offline — stays queued for next rejoin
      queueRemove(code, it.question_id);
      applySubmitSuccess(it.question_id, it.body, res);
      toast('Queued answer delivered');
    });
  });
}

function bindCards() {
  app.querySelectorAll('[data-submit]').forEach(btn => btn.onclick = () => {
    const qid = btn.dataset.submit;
    const q = pState.questions.find(x => x.id === qid);
    let val;
    if (q.kind === 'multiple_choice') {
      val = app.querySelector(`input[name="${qid}"]:checked`)?.value;
      if (!val) return toast('Pick an option first', 'bg-amber-500');
    } else {
      val = $('#in-' + qid).value.trim();
      if (!val) return toast('Type an answer first', 'bg-amber-500');
    }
    sendResponse(qid, val);
  });
  app.querySelectorAll('[data-acc]').forEach(btn => btn.onclick = () => {
    const qid = btn.dataset.acc;
    if (!official.has(qid)) return toast('Locked until you answer every question', 'bg-amber-500');
    document.getElementById('acc-' + qid).classList.toggle('hidden');
  });
  app.querySelectorAll('[data-note]').forEach(ta => {
    ta.onchange = () => getSocket().emit('save_note', { question_id: ta.dataset.note, body: ta.value }, () => toast('Note saved', 'bg-amber-500'));
  });
}

    const payload = {
      email: $('#a-email').value.trim(),
      password: $('#a-pass').value,
      guest_token: token,
    };
    if (!login) payload.display_name = $('#a-name').value.trim();
    const res = await fetch(`/api/${login ? 'login' : 'signup'}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload),
    });

    if (!res.ok) { $('#a-err').textContent = body.error; $('#a-err').classList.remove('hidden'); return; }
    me = body; renderNav();

}

    app.innerHTML = `<main class="max-w-sm mx-auto p-6 pt-12 anim-in"><div class="bg-slate-800 rounded-2xl p-6 space-y-4">

      <button id="r-go" class="tap w-full bg-rose-600 hover:bg-rose-500 rounded-xl py-3 font-bold">Send reset link</button>

      });
      // Always confirm without revealing whether the account exists.
      app.querySelector('.bg-slate-800').innerHTML = `<div class="text-center space-y-3 py-4">
        <i data-lucide="mail-check" class="w-10 h-10 mx-auto text-emerald-400"></i>

      icons();
    };
    $('#r-go').onclick = go;
    $('#r-email').addEventListener('keydown', e => e.key === 'Enter' && go());
    icons();
    return;
  }
  app.innerHTML = `<main class="max-w-sm mx-auto p-6 pt-12 anim-in"><div class="bg-slate-800 rounded-2xl p-6 space-y-4">

    <button id="r-go" class="tap w-full bg-rose-600 hover:bg-rose-500 rounded-xl py-3 font-bold">Set password &amp; log in</button>
  </div></main>`;
  const go = async () => {
    const res = await fetch('/api/auth/reset', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: tokenArg, password: $('#r-pass').value }),
    });
    const body = await res.json().catch(() => ({}));
    if (!res.ok) { $('#r-err').textContent = body.error; $('#r-err').classList.remove('hidden'); return; }

    <p class="text-sm text-slate-300 whitespace-pre-wrap">${esc(s.description)}</p>
    ${s.media?.length ? `<div class="flex gap-2 overflow-x-auto">${s.media.map(m =>
      `<img src="${esc(m.url)}" class="h-24 rounded-xl">`).join('')}</div>` : ''}
    <div class="bg-slate-800 rounded-2xl p-4 space-y-2">
      <p class="text-xs font-bold text-slate-500">WHAT YOU'LL FACE</p>
      ${tracks.length
        ? tracks.map(t => `<p class="text-sm"><span class="text-amber-400 font-semibold">${esc(t)}</span> · ${countFor(t)} questions</p>`).join('')
        : `<p class="text-sm">${s.questions.length} questions</p>`}
      <p class="text-xs text-slate-500">Question prompts and official answers are revealed by playing — answers unlock only after you submit every question.</p>
    </div>
    ${!me ? `<div class="bg-amber-500/10 border border-amber-500/40 rounded-2xl px-4 py-3 text-sm text-amber-200 flex items-start gap-2">
      <i data-lucide="info" class="w-4 h-4 shrink-0 mt-0.5"></i>
      <span>You can try this solo without an account — but your run <b>won't be saved</b>. <a href="#/signup" class="underline font-semibold">Sign up</a> to keep your runs in a library.</span></div>` : ''}
    <div class="space-y-3">
      ${tracks.length ? `
      <div><label class="text-xs font-semibold text-slate-400">Play as</label>
        <select id="sd-role" class="tap mt-1 w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2.5 text-sm">
          ${tracks.map(t => `<option>${esc(t)}</option>`).join('')}
          <option value="">All roles</option>
        </select></div>` : ''}
      <div class="flex items-center gap-2 flex-wrap">
        <button id="sd-solo" class="tap flex items-center gap-1.5 bg-rose-600 hover:bg-rose-500 rounded-xl px-5 py-3 font-bold text-sm"><i data-lucide="user" class="w-4 h-4"></i>Try Solo</button>
        <button data-launch="${s.id}" class="tap flex items-center gap-1.5 bg-emerald-600 hover:bg-emerald-500 rounded-xl px-5 py-3 font-bold text-sm"><i data-lucide="radio-tower" class="w-4 h-4"></i>Host Live</button>
        <button id="sd-clone" class="tap flex items-center gap-1.5 bg-slate-700 hover:bg-slate-600 rounded-xl px-4 py-3 text-sm"><i data-lucide="copy-plus" class="w-4 h-4"></i>Clone</button>
      </div>
    </div>
  </main>`;
  icons();
  bindLaunchButtons();
  $('#sd-solo').onclick = () => {
    const role = $('#sd-role')?.value ?? '';
    location.hash = `#/solo/${s.id}?role=${encodeURIComponent(role)}`;
  };
  $('#sd-clone').onclick = async () => {
    if (!me) { sessionStorage.authNext = location.hash; location.hash = '#/login'; return; }
    const r = await fetch(`/api/scenarios/${s.id}/clone`, { method: 'POST' });
    if (r.ok) { toast('Cloned to your private library'); location.hash = '#/me'; }
    else toast('Clone failed', 'bg-rose-600');
  };
}

async function renderSolo(scenarioId) {
  const params = new URLSearchParams(location.hash.split('?')[1] || '');
  const role = params.get('role') || '';
  const res = await fetch(`/api/scenarios/${scenarioId}`);
  if (!res.ok) { toast('Scenario not found', 'bg-rose-600'); location.hash = '#/public'; return; }
  const s = await res.json();
  const qs = s.questions.filter(q => !role || !q.role_track || q.role_track === role);
  if (!qs.length) { toast('No questions for this role', 'bg-amber-500'); location.hash = `#/scenario/${scenarioId}`; return; }
  app.innerHTML = `
  <main class="max-w-md mx-auto p-4 pb-24 space-y-4 anim-in">
    <header>
      <p class="text-xs font-bold text-rose-400 flex items-center gap-1.5"><i data-lucide="user" class="w-3.5 h-3.5"></i>SOLO RUN${role ? ` · <span class="text-amber-400">${esc(role)}</span>` : ''}</p>
      <h1 class="text-xl font-bold leading-tight">${esc(s.title)}</h1>
    </header>
    <p class="text-sm text-slate-300 whitespace-pre-wrap">${esc(s.description)}</p>
    ${!me ? `<div class="bg-amber-500/10 border border-amber-500/40 rounded-2xl px-4 py-3 text-xs text-amber-200">Playing as a guest — this run <b>won't be saved</b>.</div>` : ''}
    <div id="solo-cards" class="space-y-4">
    ${qs.map((q, i) => `
      <div class="bg-slate-800 rounded-2xl p-4 space-y-3">
        <p class="font-semibold text-sm leading-snug"><span class="text-rose-400 font-bold">Q${i + 1}.</span> ${q.role_track ? `<span class="text-amber-400">${esc(q.role_track)}</span> · ` : ''}${esc(q.prompt)}</p>
        ${q.kind === 'multiple_choice'
          ? `<div class="space-y-2">${(q.choices || []).map(c => `
              <label class="tap flex items-center gap-3 bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 cursor-pointer has-[:checked]:border-amber-500">
                <input type="radio" name="solo-${q.id}" value="${esc(c)}" class="accent-rose-600 w-5 h-5"><span class="text-sm">${esc(c)}</span></label>`).join('')}</div>`
          : `<textarea data-solo="${q.id}" rows="3" placeholder="Type your answer…" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:border-amber-500 focus:outline-none"></textarea>`}
        <div class="flex items-center gap-2 text-xs text-slate-500"><i data-lucide="lock" class="w-3.5 h-3.5"></i>Official answer unlocks when you submit the full run</div>
      </div>`).join('')}
    </div>
    <button id="solo-submit" class="tap w-full bg-rose-600 hover:bg-rose-500 rounded-xl py-3.5 font-bold">Submit Run — Reveal Official Answers</button>
  </main>`;
  icons();
  const answerOf = q => q.kind === 'multiple_choice'
    ? app.querySelector(`input[name="solo-${q.id}"]:checked`)?.value ?? ''
    : app.querySelector(`[data-solo="${q.id}"]`).value.trim();
  $('#solo-submit').onclick = async () => {
    const answers = Object.fromEntries(qs.map(q => [q.id, answerOf(q)]));
    if (qs.some(q => !answers[q.id])) return toast('Answer every question first — no partial reveals', 'bg-amber-500');
    const btn = $('#solo-submit'); btn.disabled = true; btn.textContent = 'Submitting…';
    if (me) {
      const run = await fetch('/api/solo/runs', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ scenario_id: s.id, role_track: role }),
      }).then(r => r.ok ? r.json() : null);
      let last = null;
      if (run) for (const q of qs) {
        last = await fetch(`/api/solo/runs/${run.run_id}/answers`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question_id: q.id, body: answers[q.id] }),
        }).then(r => r.ok ? r.json() : null);
      }
      if (!run || !last?.complete) { toast('Could not save the run', 'bg-rose-600'); btn.disabled = false; btn.textContent = 'Submit Run — Reveal Official Answers'; return; }
      toast('Run saved to your library');
      location.hash = `#/session/${run.run_id}`;
      return;
    }
    const r = await fetch(`/api/scenarios/${s.id}/solo-reveal`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ answers, role_track: role }),
    });
    if (!r.ok) { toast('Submit failed', 'bg-rose-600'); btn.disabled = false; btn.textContent = 'Submit Run — Reveal Official Answers'; return; }
    const { official_answers } = await r.json();
    soloReveal(s, qs, answers, official_answers, role);
  };
}

function soloReveal(s, qs, answers, official, role) {
  app.innerHTML = `

    <div class="bg-amber-500/10 border border-amber-500/40 rounded-2xl px-4 py-3 text-sm text-amber-200 flex items-start gap-2">
      <i data-lucide="info" class="w-4 h-4 shrink-0 mt-0.5"></i>
      <span>This run isn't saved. <a href="#/signup" class="underline font-semibold">Create a free account</a> and future solo runs land in your library.</span></div>
    ${qs.map((q, i) => `
    <div class="bg-slate-800 rounded-2xl p-4 space-y-3">
      <p class="font-semibold text-sm leading-snug"><span class="text-rose-400 font-bold">Q${i + 1}.</span> ${q.role_track ? `<span class="text-amber-400">${esc(q.role_track)}</span> · ` : ''}${esc(q.prompt)}</p>
      <div class="bg-slate-900 rounded-xl px-4 py-3 text-sm"><p class="text-xs font-bold text-slate-500 mb-1">YOUR ANSWER</p>${esc(answers[q.id])}</div>
      <div class="bg-emerald-950/40 border border-emerald-900 rounded-xl px-4 py-3 text-sm text-emerald-100"><p class="text-xs font-bold text-emerald-400 mb-1">OFFICIAL ANSWER</p>${esc(official[q.id])}</div>

  </main>`;
  icons();
}

async function renderSessionDetail(id) {
  if (!me) { sessionStorage.authNext = `#/session/${id}`; location.hash = '#/login'; return; }
  const res = await fetch(`/api/me/sessions/${id}`);
  if (!res.ok) { toast('Session not found', 'bg-rose-600'); location.hash = '#/me'; return; }
  const { session, questions, responses, notes, media, my_participant_id,
          analysis, analysis_available, my_debrief } = await res.json();
  const isHost = session.host_id === me.id;
  const assessFor = rid => analysis?.assessments?.find(a => a.response_id === rid);
  const badge = c => c === 'review'
    ? `<span class="text-xs font-bold px-2 py-0.5 rounded-full bg-amber-500/20 text-amber-300">⚠ REVIEW</span>`
    : c === 'aligned'
      ? `<span class="text-xs font-bold px-2 py-0.5 rounded-full bg-emerald-500/20 text-emerald-300">ALIGNED</span>`
      : `<span class="text-xs font-bold px-2 py-0.5 rounded-full bg-slate-600/50 text-slate-300">DIVERGENT</span>`;
  app.innerHTML = `
  <main class="max-w-2xl mx-auto p-4 sm:p-6 space-y-4 anim-in pb-16">
    <a href="#/me" class="text-sm text-slate-400 hover:text-white flex items-center gap-1"><i data-lucide="arrow-left" class="w-4 h-4"></i>My Library</a>
    <div class="bg-slate-800 rounded-2xl p-5 flex items-start justify-between gap-3 flex-wrap">
      <div class="min-w-0">
        <h1 class="font-bold text-lg">${esc(session.title)}</h1>
        <p class="text-sm text-slate-400 mt-1">${esc(session.category)} · ${esc(session.subcategory)} · ${session.mode === 'solo' ? '<span class="text-rose-400 font-semibold">solo run</span>' : `room ${esc(session.room_code)}`} · ${esc(session.started_at)}</p>
      </div>
      <a href="/api/me/sessions/${esc(session.id)}/pdf" class="tap flex items-center gap-2 bg-rose-600 hover:bg-rose-500 rounded-xl px-4 py-2.5 font-bold text-sm shrink-0">
        <i data-lucide="file-down" class="w-4 h-4"></i>Download PDF</a>
    </div>
    ${media?.length ? `<div class="-mx-4">${mediaStrip(media, session.image_url)}</div>` : ''}
    <div class="bg-rose-950/50 border border-rose-800/50 rounded-xl p-4 text-sm text-rose-100">
      <p class="font-bold text-rose-300 mb-1">DISPATCH</p>${esc(session.description)}
    </div>
    ${my_debrief ? `
    <div class="bg-indigo-950/40 border border-indigo-800/60 rounded-2xl p-4 space-y-2">
      <p class="text-xs font-bold text-indigo-300 flex items-center gap-1.5"><i data-lucide="clipboard-check" class="w-4 h-4"></i>INSTRUCTOR DEBRIEF</p>
      <p class="text-sm text-indigo-100 whitespace-pre-wrap">${esc(my_debrief.body)}</p>
    </div>` : ''}
    ${isHost && session.status === 'ended' && (analysis_available || analysis) ? `
    <div class="bg-slate-800 rounded-2xl p-4 space-y-3">
      <div class="flex items-center justify-between gap-2 flex-wrap">
        <p class="font-semibold flex items-center gap-2 text-sm"><i data-lucide="sparkles" class="w-4 h-4 text-indigo-400"></i>AI After-Action <span class="text-xs text-slate-500 font-normal">advisory — you review before crew see anything</span></p>
        ${!analysis ? `<button id="aa-gen" class="tap text-sm bg-indigo-600 hover:bg-indigo-500 rounded-xl px-4 py-2 font-semibold">Generate</button>`
          : analysis.debriefs.some(d => !d.shared_at)
            ? `<button id="aa-share" class="tap text-sm bg-emerald-600 hover:bg-emerald-500 rounded-xl px-4 py-2 font-semibold">Share all debriefs</button>`
            : `<span class="text-xs font-semibold text-emerald-400">Debriefs shared</span>`}
      </div>
      ${analysis ? `
      <div class="bg-slate-900 rounded-xl px-4 py-3 text-sm"><p class="text-xs font-bold text-slate-500 mb-1">CREW SUMMARY</p>${esc(analysis.crew_summary)}</div>
      <div class="space-y-2">
        ${analysis.debriefs.map(d => `
        <div class="bg-slate-900 rounded-xl px-4 py-3 text-sm space-y-2" data-debrief="${esc(d.id)}">
          <div class="flex items-center justify-between gap-2">
            <p class="text-xs font-bold text-slate-400">${esc(d.display_tag)} ${d.shared_at ? '<span class="text-emerald-400">· shared</span>' : '<span class="text-amber-400">· draft</span>'}</p>
            ${!d.shared_at ? `<button data-edit-debrief="${esc(d.id)}" class="tap text-xs text-slate-400 hover:text-white flex items-center gap-1"><i data-lucide="pencil" class="w-3.5 h-3.5"></i>Edit</button>` : ''}
          </div>
          <p class="whitespace-pre-wrap" data-debrief-body>${esc(d.body)}</p>
        </div>`).join('')}
      </div>` : `<p class="text-sm text-slate-500 italic">No analysis yet — generate one from the crew's answers.</p>`}
    </div>` : ''}
    ${questions.map((qn, i) => {
      const mineResp = responses.find(r => r.question_id === qn.id && r.participant_id === my_participant_id);
      const pushed = responses.filter(r => r.question_id === qn.id && r.is_pushed);
      const note = notes.find(n => n.question_id === qn.id);
      return `<div class="bg-slate-800 rounded-2xl p-4 space-y-3">
        <p class="font-semibold text-sm"><span class="text-rose-400 font-bold">Q${i + 1}.</span> ${qn.role_track ? `<span class="text-amber-400">${esc(qn.role_track)}</span> · ` : ''}${esc(qn.prompt)}</p>
        ${mineResp ? `<div class="bg-slate-900 rounded-xl px-4 py-3 text-sm"><p class="text-xs font-bold text-slate-500 mb-1">YOUR ANSWER</p>${esc(mineResp.body)}</div>` : ''}
        ${isHost && analysis ? responses.filter(r => r.question_id === qn.id).map(r => {
          const a = assessFor(r.id);
          return `<div class="bg-slate-900 rounded-xl px-4 py-3 text-sm space-y-1 ${a?.classification === 'review' ? 'border border-amber-500/40' : ''}">
            <div class="flex items-center justify-between gap-2"><p class="text-xs font-bold text-slate-500">${esc(r.display_tag)}${r.role_track ? ` · <span class="text-amber-400">${esc(r.role_track)}</span>` : ''}</p>${a ? badge(a.classification) : ''}</div>
            <p>${esc(r.body)}</p>
            ${a ? `<p class="text-xs text-slate-400 italic">${esc(a.rationale)}</p>` : ''}
          </div>`;
        }).join('') : ''}
        ${pushed.map(p => `<div class="bg-slate-900 border-l-4 border-rose-500 rounded-lg px-3 py-2.5 text-sm"><p class="text-xs font-bold text-rose-400 mb-0.5">PUSHED · ${esc(p.display_tag)}</p>${esc(p.body)}</div>`).join('')}
        ${qn.instructor_answer != null ? `<div class="bg-emerald-950/40 border border-emerald-900 rounded-xl px-4 py-3 text-sm text-emerald-100"><p class="text-xs font-bold text-emerald-400 mb-1">OFFICIAL ANSWER</p>${esc(qn.instructor_answer)}</div>` : ''}
        ${note ? `<div class="bg-amber-950/30 border border-amber-800/50 rounded-xl px-4 py-3 text-sm"><p class="text-xs font-bold text-amber-400 mb-1">YOUR NOTES</p>${esc(note.body)}</div>` : ''}
      </div>`;
    }).join('')}
  </main>`;
  icons();
  const gen = $('#aa-gen');
  if (gen) gen.onclick = async () => {
    gen.disabled = true; gen.textContent = 'Analyzing…';
    const r = await fetch(`/api/me/sessions/${session.id}/analysis`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
    if (r.ok) { toast('After-action ready — review the drafts'); renderSessionDetail(id); }
    else { toast((await r.json()).error, 'bg-rose-600'); gen.disabled = false; gen.textContent = 'Generate'; }
  };
  const shareBtn = $('#aa-share');
  if (shareBtn) shareBtn.onclick = async () => {
    if (!confirm('Share all draft debriefs with their participants? They will see the current text.')) return;
    const r = await fetch(`/api/me/sessions/${session.id}/debriefs/share`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
    if (r.ok) { toast('Debriefs shared with the crew'); renderSessionDetail(id); }
    else toast('Share failed', 'bg-rose-600');
  };
  app.querySelectorAll('[data-edit-debrief]').forEach(btn => btn.onclick = async () => {
    const card = btn.closest('[data-debrief]');
    const current = card.querySelector('[data-debrief-body]').textContent;
    const next = prompt('Edit this debrief (the participant will see exactly this):', current);
    if (next == null || !next.trim() || next === current) return;
    const r = await fetch(`/api/me/sessions/${session.id}/debriefs/${btn.dataset.editDebrief}`, {
      method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ body: next.trim() }) });
    if (r.ok) { toast('Debrief updated'); renderSessionDetail(id); }
    else toast('Update failed', 'bg-rose-600');
  });
}

function bindLaunchButtons() {
  app.querySelectorAll('[data-launch]').forEach(btn => btn.onclick = async () => {
    if (!me) { sessionStorage.authNext = location.hash; location.hash = '#/login'; return; }
    const res = await fetch('/api/sessions', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ scenario_id: btn.dataset.launch }),
    });
    if (!res.ok) { toast('Could not launch session', 'bg-rose-600'); return; }
    location.hash = '#/host/' + (await res.json()).room_code;
  });
}

    <section class="bg-slate-800 rounded-2xl p-5 flex items-center justify-between gap-4 flex-wrap">
      <div>
        <p class="text-sm text-slate-400">Join code — share it in the dayroom</p>
        <p class="text-3xl font-black tracking-[0.3em] text-amber-400 font-mono">${esc(department.join_code)}</p>
      </div>
      <button id="d-regen" class="tap flex items-center gap-1.5 text-sm bg-slate-700 hover:bg-slate-600 rounded-xl px-4 py-2.5"><i data-lucide="refresh-cw" class="w-4 h-4"></i>New code</button>
    </section>` : ''}

    <section class="bg-slate-800 rounded-2xl p-5 space-y-2">
      <h2 class="font-semibold flex items-center gap-2"><i data-lucide="users" class="w-4 h-4 text-amber-400"></i>Members (${members.length})</h2>
      ${members.map(m => `
      <div class="flex items-center gap-3 py-1.5">
        <span class="flex-1">${esc(m.display_name)}</span>
        ${m.role === 'dept_admin' ? '<span class="text-xs font-semibold bg-emerald-900/60 text-emerald-300 px-2.5 py-1 rounded-full">Training Chief</span>' : ''}
        ${chief && m.id !== me.id ? `<button data-kick="${m.id}" class="tap text-slate-500 hover:text-rose-400 px-2 text-sm">Remove</button>` : ''}
      </div>`).join('')}
    </section>

    ${chief && analytics ? `
    <section class="bg-slate-800 rounded-2xl p-5 space-y-3">
      <h2 class="font-semibold flex items-center gap-2"><i data-lucide="chart-column" class="w-4 h-4 text-emerald-400"></i>Training Dashboard</h2>
      <div class="grid grid-cols-3 gap-3 text-center">
        <div class="bg-slate-900 rounded-xl p-3"><p class="text-2xl font-black text-emerald-400">${analytics.totals.sessions}</p><p class="text-xs text-slate-400">Sessions</p></div>
        <div class="bg-slate-900 rounded-xl p-3"><p class="text-2xl font-black text-amber-400">${analytics.totals.members_trained}</p><p class="text-xs text-slate-400">Members trained</p></div>
        <div class="bg-slate-900 rounded-xl p-3"><p class="text-2xl font-black text-rose-400">${analytics.totals.responses}</p><p class="text-xs text-slate-400">Responses</p></div>
      </div>
      ${analytics.sessions.length ? `
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead><tr class="text-left text-xs text-slate-500">
            <th class="py-2 pr-3">Scenario</th><th class="py-2 pr-3">Host</th><th class="py-2 pr-3">Date</th>
            <th class="py-2 pr-3 text-right">Crew</th><th class="py-2 text-right">Response rate</th>
          </tr></thead>
          <tbody>${analytics.sessions.map(s => `
            <tr class="border-t border-slate-700">
              <td class="py-2 pr-3">${esc(s.title)}</td>
              <td class="py-2 pr-3 text-slate-400">${esc(s.host_name)}</td>
              <td class="py-2 pr-3 text-slate-400">${esc(s.started_at.slice(0, 10))}</td>
              <td class="py-2 pr-3 text-right">${s.participant_count}</td>
              <td class="py-2 text-right font-semibold ${s.response_rate >= 70 ? 'text-emerald-400' : s.response_rate >= 40 ? 'text-amber-400' : 'text-rose-400'}">${s.response_rate}%</td>
            </tr>`).join('')}</tbody>
        </table>
      </div>` : '<p class="text-sm text-slate-500 italic">No sessions hosted by department members yet.</p>'}
    </section>

    <section class="bg-slate-800 rounded-2xl p-5 space-y-2">
      <h2 class="font-semibold flex items-center gap-2"><i data-lucide="shield-check" class="w-4 h-4 text-emerald-400"></i>Official Department Protocol</h2>
      <p class="text-sm text-slate-400">Department-visibility scenarios you can badge. Official scenarios pin to the top of every member's library.</p>
      <div id="d-official" class="space-y-2"></div>
    </section>` : ''}
  </main>`;
  icons();
  $('#d-leave').onclick = async () => {
    if (!confirm('Leave this department?')) return;
    const r = await fetch('/api/departments/leave', { method: 'POST' });
    if (r.ok) { toast('Left department'); await refreshMe(); renderDepartment(); }
    else toast((await r.json()).error, 'bg-rose-600');
  };
  if (chief) {
    const regen = $('#d-regen');
    if (regen) regen.onclick = async () => {
      await fetch('/api/departments/regenerate-code', { method: 'POST' });
      toast('Join code regenerated'); renderDepartment();
    };
    app.querySelectorAll('[data-kick]').forEach(btn => btn.onclick = async () => {
      if (!confirm('Remove this member from the department?')) return;
      await fetch('/api/departments/remove-member', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user_id: btn.dataset.kick }) });
      renderDepartment();
    });
    // list department scenarios with official toggles
    const all = await fetch('/api/scenarios').then(r => r.json());
    const deptScenarios = all.filter(s => s.visibility === 'department' && !s.deleted_at);
    $('#d-official').innerHTML = deptScenarios.map(s => `
      <div class="flex items-center gap-3 bg-slate-900 rounded-xl p-3">
        <span class="flex-1 text-sm font-medium truncate">${esc(s.title)}</span>
        <button data-official="${s.id}" data-state="${s.is_official}" class="tap text-xs font-bold px-3 py-2 rounded-lg ${s.is_official ? 'bg-emerald-600' : 'bg-slate-700 hover:bg-slate-600'}">
          ${s.is_official ? '✓ OFFICIAL' : 'Mark Official'}</button>
      </div>`).join('') || '<p class="text-sm text-slate-500 italic">No department-visibility scenarios yet — set a scenario\'s visibility to Department in the creator.</p>';
    $('#d-official').querySelectorAll('[data-official]').forEach(btn => btn.onclick = async () => {
      const r = await fetch(`/api/scenarios/${btn.dataset.official}/official`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ official: btn.dataset.state !== '1' }),
      });
      if (r.ok) renderDepartment(); else toast((await r.json()).error, 'bg-rose-600');
    });
  }
}

/* ═══ Moderation (site admin) ═══ */
async function renderModeration() {
  if (!me || me.role !== 'site_admin') { location.hash = '#/'; return; }
  const [reports, pendingDepts] = await Promise.all([
    fetch('/api/moderation/reports').then(r => r.json()),
    fetch('/api/moderation/departments').then(r => r.json()),
  ]);
  app.innerHTML = `
  <main class="max-w-2xl mx-auto p-4 sm:p-6 space-y-4 anim-in">
    <h1 class="text-2xl font-bold flex items-center gap-2"><i data-lucide="shield-alert" class="w-6 h-6 text-rose-400"></i>Moderation Queue</h1>

    <h2 class="font-semibold flex items-center gap-2 pt-1"><i data-lucide="graduation-cap" class="w-4 h-4 text-indigo-400"></i>Learning Objectives</h2>
    <div class="bg-slate-800 rounded-2xl p-4 space-y-2">
      <p class="text-sm text-slate-400">The controlled vocabulary authors tag scenarios with. Additions are permanent — keep it curated.</p>
      <div class="flex gap-2">
        <input id="obj-name" placeholder="New objective, e.g. Salvage & Overhaul" class="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-sm focus:border-indigo-500 focus:outline-none">
        <button id="obj-add" class="tap text-sm bg-indigo-600 hover:bg-indigo-500 rounded-xl px-4 py-2.5 font-semibold">Add</button>
      </div>
    </div>

    <h2 class="font-semibold flex items-center gap-2 pt-1"><i data-lucide="building-2" class="w-4 h-4 text-amber-400"></i>Pending Departments</h2>
    ${pendingDepts.map(d => `
    <div class="bg-slate-800 rounded-2xl p-4 space-y-2">
      <div class="flex items-center justify-between gap-2">
        <p class="font-bold truncate">${esc(d.name)}</p>
        <span class="text-xs text-slate-500 shrink-0">${d.member_count} member${d.member_count === 1 ? '' : 's'}</span>
      </div>
      <p class="text-sm text-slate-400">requested by ${esc(d.creator_name ?? 'unknown')} (${esc(d.creator_email ?? '—')}) · ${esc(d.created_at)}</p>
      <div class="flex gap-2">
        <button data-dept="${d.id}" data-daction="reject" class="tap flex-1 text-sm bg-slate-700 hover:bg-slate-600 rounded-xl py-2.5 font-semibold">Reject</button>
        <button data-dept="${d.id}" data-daction="approve" class="tap flex-1 text-sm bg-emerald-600 hover:bg-emerald-500 rounded-xl py-2.5 font-bold">Approve</button>
      </div>
    </div>`).join('') || '<p class="text-sm text-slate-500 italic">No departments awaiting approval.</p>'}

    <h2 class="font-semibold flex items-center gap-2 pt-2"><i data-lucide="flag" class="w-4 h-4 text-rose-400"></i>Reported Scenarios</h2>
    ${reports.map(r => `
    <div class="bg-slate-800 rounded-2xl p-4 space-y-2">
      <div class="flex items-center justify-between gap-2">
        <p class="font-bold truncate">${esc(r.title)}</p>
        <span class="text-xs text-slate-500 shrink-0">${r.open_reports} open report${r.open_reports > 1 ? 's' : ''}</span>
      </div>
      <p class="text-sm text-slate-400">by ${esc(r.author_name ?? 'unknown')} · reported ${esc(r.created_at)}</p>
      <p class="text-sm bg-slate-900 rounded-xl px-3 py-2">"${esc(r.reason)}"</p>
      <div class="flex gap-2">
        <button data-resolve="${r.id}" data-action="dismiss" class="tap flex-1 text-sm bg-slate-700 hover:bg-slate-600 rounded-xl py-2.5 font-semibold">Dismiss</button>
        <button data-resolve="${r.id}" data-action="unlist" class="tap flex-1 text-sm bg-rose-700 hover:bg-rose-600 rounded-xl py-2.5 font-bold">Unlist Scenario</button>
      </div>
    </div>`).join('') || '<p class="text-slate-500 italic">Queue is empty. All quiet.</p>'}
  </main>`;
  icons();
  $('#obj-add').onclick = async () => {
    const name = $('#obj-name').value.trim();
    if (!name) return toast('Type an objective name first', 'bg-amber-500');
    const r = await fetch('/api/objectives', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name }),
    });
    if (r.ok) { toast(`"${name}" added to the vocabulary`); $('#obj-name').value = ''; }
    else toast('Could not add objective', 'bg-rose-600');
  };
  app.querySelectorAll('[data-resolve]').forEach(btn => btn.onclick = async () => {
    await fetch(`/api/moderation/reports/${btn.dataset.resolve}/resolve`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: btn.dataset.action }),
    });
    toast(btn.dataset.action === 'unlist' ? 'Scenario unlisted' : 'Report dismissed');
    renderModeration();
  });
  app.querySelectorAll('[data-dept]').forEach(btn => btn.onclick = async () => {
    if (btn.dataset.daction === 'reject' &&
        !confirm('Reject this department? It will be deleted and its creator reset to a standard member.')) return;
    const r = await fetch(`/api/moderation/departments/${btn.dataset.dept}/${btn.dataset.daction}`, { method: 'POST' });
    if (r.ok) toast(btn.dataset.daction === 'approve' ? 'Department approved' : 'Department rejected');
    else toast((await r.json()).error, 'bg-rose-600');
    renderModeration();
  });
}

async function refreshMe() {
  me = await fetch('/api/me').then(r => r.json()).catch(() => null);
  renderNav();
}

async function boot() {
  me = await fetch('/api/me').then(r => r.json()).catch(() => null);
  renderNav();
  route();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
}
boot();
</script>
</body>
</html>
