<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ProtoCall Trainer — CrewTable</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icon.svg">
<meta name="theme-color" content="#020617">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="/socket.io/socket.io.js"></script>
<style>
  html{background:#020617}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
  .tap{min-width:48px;min-height:48px}
  @keyframes pulse-live{0%,100%{opacity:1}50%{opacity:.4}}
  .live-dot{animation:pulse-live 1.6s infinite}
  @keyframes slide-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .anim-in{animation:slide-in .3s ease-out}
  @keyframes flash-push{0%{background:#9f1239}100%{background:#1e293b}}
  .pushed-flash{animation:flash-push 1.2s ease-out}

  /* ── v9 light theme: remaps the dark slate utilities under html[data-theme=light].
     The single colored text-white (toast) and colored buttons are untouched. ── */
  /* Soft, low-glare light theme: warm-cool neutral surfaces, no pure white,
     gentle borders + a faint card shadow for depth instead of hard contrast. */
  html[data-theme=light]{background:#e8ebf1}
  html[data-theme=light] body{background-color:#e8ebf1;color:#293241}
  html[data-theme=light] .bg-slate-950{background-color:#e8ebf1}
  html[data-theme=light] .bg-slate-900{background-color:#eef1f6}
  html[data-theme=light] .bg-slate-800{background-color:#f7f8fb;box-shadow:0 1px 2px rgba(15,23,42,.04)}
  html[data-theme=light] .bg-slate-700{background-color:#e0e5ee}
  html[data-theme=light] .bg-slate-600{background-color:#ccd3df}
  html[data-theme=light] .bg-slate-500{background-color:#9aa6b8}
  html[data-theme=light] .bg-slate-900\/95{background-color:rgba(238,241,246,.95)}
  html[data-theme=light] .bg-slate-950\/95{background-color:rgba(232,235,241,.95)}
  html[data-theme=light] .bg-slate-950\/80{background-color:rgba(232,235,241,.8)}
  html[data-theme=light] .bg-slate-800\/90{background-color:rgba(247,248,251,.9)}
  html[data-theme=light] .bg-slate-800\/60{background-color:rgba(247,248,251,.6)}
  html[data-theme=light] .bg-slate-600\/50{background-color:rgba(204,211,223,.5)}
  html[data-theme=light] .hover\:bg-slate-600:hover{background-color:#ccd3df}
  html[data-theme=light] .hover\:bg-slate-700:hover{background-color:#e0e5ee}
  html[data-theme=light] .hover\:bg-slate-800:hover{background-color:#eef1f6}
  html[data-theme=light] .hover\:bg-slate-950:hover{background-color:#dfe4ec}
  html[data-theme=light] .text-slate-100{color:#293241}
  html[data-theme=light] .text-slate-200{color:#334155}
  html[data-theme=light] .text-slate-300{color:#3d4a5d}
  html[data-theme=light] .text-slate-400{color:#5a6779}
  html[data-theme=light] .text-slate-500{color:#71809a}
  html[data-theme=light] .text-slate-600{color:#93a0b4}
  html[data-theme=light] .hover\:text-white:hover{color:#1f2937}
  html[data-theme=light] .border-slate-500{border-color:#aab4c4}
  html[data-theme=light] .border-slate-600{border-color:#d3dae4}
  html[data-theme=light] .border-slate-700{border-color:#dde3ec}
  html[data-theme=light] .border-slate-800{border-color:#e4e8f0}
  html[data-theme=light] ::-webkit-scrollbar-thumb{background:#ccd3df}
  /* soften the saturated brand colors a touch so they don't glare on light */
  html[data-theme=light] .text-sky-400{color:#0284c7}
  html[data-theme=light] .text-rose-400,html[data-theme=light] .text-rose-300{color:#e11d48}
  html[data-theme=light] .text-emerald-400{color:#059669}
  html[data-theme=light] .text-amber-400{color:#d97706}
  /* saturated buttons keep white text in light mode (they otherwise inherit
     the dark body color); amber-500 chips set their own dark text and win */
  html[data-theme=light] .bg-rose-600,html[data-theme=light] .bg-emerald-600,
  html[data-theme=light] .bg-sky-600,html[data-theme=light] .bg-amber-600,
  html[data-theme=light] .bg-rose-500,html[data-theme=light] .bg-emerald-500{color:#fff}
  html[data-theme=light] .bg-amber-500.text-slate-900{color:#0f172a}
</style>
</head>
<body class="bg-slate-950 text-slate-100 antialiased min-h-screen">

<nav class="sticky top-0 z-40 h-14 bg-slate-900/95 backdrop-blur border-b border-slate-800 px-3 sm:px-4 flex items-center justify-between gap-2">
  <div class="flex items-center gap-1">
    <button id="nav-burger" class="tap md:hidden flex items-center justify-center text-slate-300 hover:text-white" title="Menu"><i data-lucide="menu" class="w-5 h-5"></i></button>
    <a href="#/" class="flex items-center gap-2 px-1">
      <i data-lucide="flame" class="w-6 h-6 text-rose-600"></i>
      <span class="font-bold tracking-tight">ProtoCall<span class="text-rose-500">Trainer</span></span>
    </a>
  </div>
  <div id="nav-right" class="flex items-center gap-1"></div>
</nav>

<div class="flex min-h-[calc(100vh-3.5rem)]">
  <div id="sidebar-backdrop" class="fixed inset-0 top-14 z-20 bg-slate-950/80 hidden md:hidden"></div>
  <aside id="sidebar" class="fixed md:sticky top-14 z-30 h-[calc(100vh-3.5rem)] w-60 shrink-0 bg-slate-900 border-r border-slate-800 overflow-y-auto -translate-x-full md:translate-x-0 transition-transform duration-200"></aside>
  <div id="app" class="flex-1 min-w-0"></div>
</div>
<div id="toast" class="fixed top-16 left-1/2 -translate-x-1/2 z-50 bg-emerald-600 text-white px-5 py-3 rounded-xl font-semibold shadow-xl hidden anim-in"></div>

<script>
const $ = sel => document.querySelector(sel);
const app = $('#app');
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function toast(msg, color) {
  const t = $('#toast');
  t.textContent = msg;
  t.className = t.className.replace(/bg-\S+/, color || 'bg-emerald-600');
  t.classList.remove('hidden');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.add('hidden'), 2500);
}
function icons(){ lucide.createIcons(); }
const token = localStorage.pcToken || (localStorage.pcToken = crypto.randomUUID());

let socket = null;
function getSocket() {
  if (!socket) socket = io();
  return socket;
}
function leaveSocket() {
  if (socket) { socket.removeAllListeners(); socket.disconnect(); socket = null; }
}

/* ═══ v9 shell: theme ═══ */
function applyTheme() {
  const pref = localStorage.pcTheme || 'system';
  const dark = pref === 'dark' || (pref === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
  document.documentElement.dataset.theme = dark ? 'dark' : 'light';
}
matchMedia('(prefers-color-scheme: dark)').addEventListener('change',
  () => { if ((localStorage.pcTheme || 'system') === 'system') applyTheme(); });
applyTheme();

/* ═══ v9 shell: left sidebar ═══ */
const IMMERSIVE_ROUTES = new Set(['join', 'solo', 'host']); // full-focus flows: no sidebar
const routeName = () => location.hash.replace(/^#\//, '').split('?')[0].split('/')[0];
function openSidebar(open) {
  $('#sidebar').classList.toggle('-translate-x-full', !open);
  $('#sidebar-backdrop').classList.toggle('hidden', !open);
}
function renderSidebar() {
  const sb = $('#sidebar');
  const active = routeName();
  sb.style.display = IMMERSIVE_ROUTES.has(active) ? 'none' : '';
  const chiefOrAdmin = me && (me.role === 'site_admin' || (me.role === 'dept_admin' && me.department));
  const item = (hash, icon, label, extra = '') => {
    const on = active === hash.replace('#/', '') || (hash === '#/' && active === '');
    return `<a href="${hash}" class="sb-link flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium transition
      ${on ? 'bg-slate-800 text-slate-100' : 'text-slate-400 hover:text-white hover:bg-slate-800'}">
      <i data-lucide="${icon}" class="w-4 h-4 shrink-0"></i><span class="flex-1">${label}</span>${extra}</a>`;
  };
  sb.innerHTML = `
  <div class="p-3 space-y-1">
    ${me ? `<a href="#/create" class="sb-link tap flex items-center justify-center gap-2 w-full bg-rose-600 hover:bg-rose-500 rounded-xl py-2.5 font-bold text-sm mb-3"><i data-lucide="plus" class="w-4 h-4"></i>New Scenario</a>` : ''}
    ${item('#/', 'house', 'Home')}
    ${item('#/public', 'globe', 'Community')}
    ${item('#/library', 'library', 'Library')}
    ${me ? item('#/me', 'history', 'My Sessions') : ''}
    ${item('#/academies', 'graduation-cap', 'Academies')}
    ${item('#/coverage', 'grid-3x3', 'Coverage')}
    ${me ? item('#/department', 'building-2', me.department ? esc(me.department.name) : 'Department') : ''}
    ${chiefOrAdmin ? `<p class="px-4 pt-4 pb-1 text-[10px] font-black tracking-wider text-slate-500">ADMIN</p>` : ''}
    ${chiefOrAdmin ? item('#/review', 'clipboard-check', 'Review Queue', '<span id="sb-review-count" class="hidden text-[10px] font-black bg-sky-600 text-white rounded-full px-1.5 py-0.5"></span>') : ''}
    ${me?.role === 'site_admin' ? item('#/moderation', 'shield-alert', 'Moderation') : ''}
  </div>`;
  icons();
  sb.querySelectorAll('.sb-link').forEach(a => a.addEventListener('click', () => openSidebar(false)));
  if (chiefOrAdmin)
    fetch('/api/review/queue').then(r => r.ok ? r.json() : []).then(q => {
      const el = $('#sb-review-count');
      if (el && q.length) { el.textContent = q.length; el.classList.remove('hidden'); }
    }).catch(() => {});
}
$('#nav-burger').onclick = () => openSidebar($('#sidebar').classList.contains('-translate-x-full'));
$('#sidebar-backdrop').onclick = () => openSidebar(false);

/* ═══ Router ═══ */
const routes = {
  '': renderLanding,
  'library': renderLibrary,
  'create': id => renderCreator(id),
  'host': code => renderHost(code),
  'join': code => renderJoin(code),
  'login': () => renderAuth('login'),
  'signup': () => renderAuth('signup'),
  'verify': token => renderVerify(token),
  'reset': token => renderReset(token),
  'me': renderMe,
  'public': renderPublic,
  'session': id => renderSessionDetail(id),
  'scenario': id => renderScenarioDetail(id),
  'solo': id => renderSolo(id),
  'coverage': renderCoverage,
  'academies': renderAcademies,
  'academy': id => renderAcademy(id),
  'department': renderDepartment,
  'moderation': renderModeration,
  'review': renderReview,
  'account': renderAccount,
};
function route() {
  leaveSocket();
  renderSidebar();
  const [name, arg] = location.hash.replace(/^#\//, '').split('?')[0].split('/');
  (routes[name] || renderLanding)(arg);
}
window.addEventListener('hashchange', route);

/* ═══ Landing ═══ */
function renderLanding() {
  app.innerHTML = `
  <main class="max-w-md mx-auto p-6 pt-14 space-y-6 anim-in">
    <div class="text-center space-y-2">
      <i data-lucide="flame" class="w-14 h-14 text-rose-600 mx-auto"></i>
      <h1 class="text-3xl font-black">CrewTable</h1>
      <p class="text-slate-400">Live tactical fireground & EMS scenario training</p>
    </div>
    <div class="bg-slate-800 rounded-2xl p-5 space-y-3">
      <label class="text-sm font-semibold text-slate-300">Join a live session</label>
      <div class="flex gap-2">
        <input id="join-code" placeholder="ROOM CODE e.g. FIRE-4821" class="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 uppercase font-mono tracking-wider focus:border-amber-500 focus:outline-none">
        <button id="join-btn" class="tap bg-rose-600 hover:bg-rose-500 rounded-xl px-5 font-bold">Join</button>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-3">
      <a href="#/library" class="tap bg-slate-800 hover:bg-slate-700 rounded-2xl p-5 text-center space-y-2">
        <i data-lucide="radio-tower" class="w-7 h-7 mx-auto text-emerald-400"></i>
        <p class="font-semibold text-sm">Host a Session</p>
      </a>
      <a href="#/create" class="tap bg-slate-800 hover:bg-slate-700 rounded-2xl p-5 text-center space-y-2">
        <i data-lucide="square-pen" class="w-7 h-7 mx-auto text-amber-400"></i>
        <p class="font-semibold text-sm">Build a Scenario</p>
      </a>
    </div>
  </main>`;
  icons();
  const go = () => {
    const code = $('#join-code').value.trim().toUpperCase();
    if (code) location.hash = '#/join/' + code;
  };
  $('#join-btn').onclick = go;
  $('#join-code').addEventListener('keydown', e => e.key === 'Enter' && go());
}

/* ═══ Library ═══ */
/* ═══ v9 browse helpers: filter rail + square card grid (3-up on desktop) ═══ */
const scenarioChips = s => [
  s.is_official ? '<span class="text-[10px] font-black tracking-wider bg-emerald-600 text-white px-2 py-0.5 rounded-full inline-flex items-center gap-1"><i data-lucide="shield-check" class="w-3 h-3"></i>OFFICIAL</span>' : '',
  s.visibility === 'department' && !s.is_official ? '<span class="text-[10px] font-bold tracking-wider bg-slate-700 text-emerald-300 px-2 py-0.5 rounded-full">DEPARTMENT</span>' : '',
  s.mine && s.review_status === 'pending' ? '<span class="text-[10px] font-bold bg-sky-600 text-white px-2 py-0.5 rounded-full">IN REVIEW</span>' : '',
  s.mine && s.review_status === 'changes_requested' ? '<span class="text-[10px] font-bold bg-amber-500 text-slate-900 px-2 py-0.5 rounded-full">CHANGES</span>' : '',
  s.difficulty ? `<span class="text-[10px] font-bold bg-slate-700 text-slate-300 px-2 py-0.5 rounded-full">${esc(s.difficulty.toUpperCase())}</span>` : '',
].filter(Boolean).join('');

const scenarioCard = (s, { corner = '', footer = '' } = {}) => `
  <div class="bg-slate-800 rounded-2xl p-4 flex flex-col gap-2 min-h-[230px] ${s.is_official ? 'ring-1 ring-emerald-600/60' : ''}">
    <div class="flex items-start justify-between gap-2">
      <div class="flex items-center gap-1.5 flex-wrap min-h-[20px]">${scenarioChips(s)}</div>
      ${corner}
    </div>
    <a href="#/scenario/${s.id}" class="font-bold leading-snug hover:underline line-clamp-2">${esc(s.title)}</a>
    <p class="text-xs text-slate-500">${esc(s.category)} · ${esc(s.subcategory)} · ${s.question_count} question${s.question_count === 1 ? '' : 's'}${s.objective_primary ? ' · ' + esc(s.objective_primary) : ''}</p>
    <p class="text-sm text-slate-400 line-clamp-3 flex-1">${esc(s.description || '')}</p>
    <div class="flex items-center gap-2 pt-1">${footer}</div>
  </div>`;

const filterPanel = (fields, mobile = false) => `
  <div class="${mobile ? 'lg:hidden mb-4' : 'hidden lg:block w-56 shrink-0'}">
    <div class="bg-slate-800 rounded-2xl p-4 space-y-4 ${mobile ? '' : 'sticky top-[4.5rem]'}">
      <p class="text-xs font-black tracking-wider text-slate-500">FILTERS</p>
      ${fields}
    </div>
  </div>`;

async function renderLibrary() {
  const [scenarios, objectives] = await Promise.all([
    fetch('/api/scenarios').then(r => r.json()),
    fetch('/api/objectives').then(r => r.json()).catch(() => []),
  ]);
  const st = { q: '', cat: '', sub: '', diff: '', obj: '', own: 'all' };
  const OWN = [['all', 'All'], ...(me ? [['mine', 'Mine']] : []),
    ...(me?.department ? [['department', 'Department']] : []), ['official', 'Official']];
  const visible = () => scenarios.filter(s => {
    if (s.deleted_at) return false;
    // scenarios awaiting review stay out of the Library — authors find their
    // own under the Mine filter (flagged IN REVIEW), reviewers in #/review
    if (s.review_status === 'pending' && st.own !== 'mine') return false;
    if (st.own === 'mine' && !s.mine) return false;
    if (st.own === 'department' && s.visibility !== 'department') return false;
    if (st.own === 'official' && !s.is_official) return false;
    if (st.cat && s.category !== st.cat) return false;
    if (st.sub && s.subcategory !== st.sub) return false;
    if (st.diff && s.difficulty !== st.diff) return false;
    if (st.obj && s.objective_primary !== st.obj && s.objective_secondary !== st.obj) return false;
    if (st.q && !`${s.title} ${s.description}`.toLowerCase().includes(st.q.toLowerCase())) return false;
    return true;
  });
  const deleted = me ? scenarios.filter(s => s.mine && s.deleted_at) : [];
  const sel = 'tap w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm';
  const fields = `
    <input id="lf-q" placeholder="Search…" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm focus:border-rose-500 focus:outline-none">
    <div><label class="text-xs font-semibold text-slate-400">Category</label>
      <select id="lf-cat" class="${sel} mt-1"><option value="">All</option>${Object.keys(SUBCATS).map(c => `<option>${c}</option>`).join('')}</select></div>
    <div><label class="text-xs font-semibold text-slate-400">Subcategory</label>
      <select id="lf-sub" class="${sel} mt-1"><option value="">All</option></select></div>
    <div><label class="text-xs font-semibold text-slate-400">Difficulty</label>
      <select id="lf-diff" class="${sel} mt-1"><option value="">All</option><option>Introductory</option><option>Standard</option><option>Advanced</option></select></div>
    <div><label class="text-xs font-semibold text-slate-400">Objective</label>
      <select id="lf-obj" class="${sel} mt-1"><option value="">All</option>${objectives.map(o => `<option>${esc(o)}</option>`).join('')}</select></div>
    <div><label class="text-xs font-semibold text-slate-400">Show</label>
      <div id="lf-own" class="grid grid-cols-2 gap-1.5 mt-1">
        ${OWN.map(([v, l]) => `<button data-own="${v}" class="tap text-xs font-semibold rounded-lg py-2 ${st.own === v ? 'bg-rose-600 text-white' : 'bg-slate-900 border border-slate-700 hover:border-slate-500'}">${l}</button>`).join('')}
      </div></div>`;
  app.innerHTML = `
  <main class="max-w-6xl mx-auto p-4 sm:p-6 anim-in">
    <div class="flex items-center justify-between mb-4">
      <div><h1 class="text-2xl font-bold">Library</h1>
        <p class="text-sm text-slate-400">Everything you can launch or train on — public, department, and your own.</p></div>
      ${me ? '<a href="#/create" class="tap flex md:hidden items-center gap-1.5 text-sm bg-rose-600 hover:bg-rose-500 px-4 py-2.5 rounded-xl font-medium"><i data-lucide="plus" class="w-4 h-4"></i>New</a>' : ''}
    </div>
    ${me ? '' : `<div class="bg-amber-950/40 border border-amber-800/50 rounded-xl p-4 mb-4 text-sm text-amber-100 flex items-center gap-3">
      <i data-lucide="log-in" class="w-5 h-5 text-amber-400 shrink-0"></i>
      <span><a href="#/login" class="font-bold text-amber-300 hover:underline">Log in</a> to host live sessions and build your own scenarios. Joining a room never needs an account.</span>
    </div>`}
    <div class="flex gap-6 items-start">
      ${filterPanel(fields)}
      <div class="flex-1 min-w-0">
        ${filterPanel(fields.replaceAll('lf-', 'lfm-'), true)}
        <div id="lib-grid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4"></div>
        <div id="lib-deleted" class="mt-6"></div>
      </div>
    </div>
  </main>`;
  const drawGrid = () => {
    $('#lib-grid').innerHTML = visible().map(s => scenarioCard(s, {
      corner: s.mine ? `<div class="flex items-center gap-0.5 -mt-1 -mr-1">
        <a href="#/create/${s.id}" class="p-1.5 text-slate-400 hover:text-white" title="Edit"><i data-lucide="pencil" class="w-3.5 h-3.5"></i></a>
        <button data-del="${s.id}" class="p-1.5 text-slate-400 hover:text-rose-400" title="Delete"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button></div>` : '',
      footer: `<a href="#/scenario/${s.id}" class="tap flex-1 text-center text-sm font-semibold bg-slate-700 hover:bg-slate-600 rounded-xl py-2.5">Details</a>
        <button data-launch="${s.id}" class="tap flex-1 text-sm font-bold bg-emerald-600 hover:bg-emerald-500 rounded-xl py-2.5 flex items-center justify-center gap-1.5"><i data-lucide="radio-tower" class="w-4 h-4"></i>Launch</button>`,
    })).join('') || '<p class="text-slate-500 italic col-span-full">No scenarios match these filters.</p>';
    $('#lib-deleted').innerHTML = st.own === 'mine' && deleted.length ? `
      <details><summary class="text-sm text-slate-500 cursor-pointer hover:text-slate-300">Deleted (${deleted.length})</summary>
      <div class="space-y-2 mt-2">${deleted.map(s => `
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 flex items-center gap-3 opacity-80">
          <div class="flex-1 min-w-0"><p class="font-bold truncate text-slate-400">${esc(s.title)}</p>
            <p class="text-xs text-slate-500">deleted ${esc(s.deleted_at)}</p></div>
          <button data-restore="${s.id}" class="tap bg-slate-700 hover:bg-slate-600 rounded-xl px-4 py-2.5 font-bold text-sm">Restore</button>
        </div>`).join('')}</div></details>` : '';
    icons();
    bindLaunchButtons();
    app.querySelectorAll('[data-del]').forEach(btn => btn.onclick = async () => {
      if (!confirm('Delete this scenario? Past sessions are kept, and you can restore it later.')) return;
      const r = await fetch(`/api/scenarios/${btn.dataset.del}`, { method: 'DELETE' });
      if (r.ok) { toast('Scenario deleted'); renderLibrary(); } else toast('Delete failed', 'bg-rose-600');
    });
    app.querySelectorAll('[data-restore]').forEach(btn => btn.onclick = async () => {
      const r = await fetch(`/api/scenarios/${btn.dataset.restore}/restore`, { method: 'POST' });

  icons();

function renderHost(code) {

  s.on('answer_pushed', r => {
    if (!hostState) return;
    const found = hostState.responses.find(x => x.id === r.id);
    if (found) found.is_pushed = 1;
    drawMatrix();
  });
  s.on('participant_count', n => { const el = $('#pcount'); if (el) el.textContent = Math.max(0, n - 1); });
  s.emit('join_room', { code, role: 'host' }, ({ error, state }) => {
    if (error) { toast(error, 'bg-rose-600'); location.hash = '#/library'; return; }
    drawHost(state);
  });
}

/* ─── Offline answer queue: queued in localStorage, flushed on rejoin ─── */
const queuedAnswers = new Map(); // question_id -> body (current room)
const readQueue = () => { try { return JSON.parse(localStorage.pcQueue || '{}'); } catch { return {}; } };
function queuePut(code, qid, body) {
  const q = readQueue();
  (q[code] ??= []).push({ question_id: qid, body });
  localStorage.pcQueue = JSON.stringify(q);
  queuedAnswers.set(qid, body);
}
function queueRemove(code, qid) {
  const q = readQueue();
  q[code] = (q[code] || []).filter(x => x.question_id !== qid);
  if (!q[code].length) delete q[code];
  localStorage.pcQueue = JSON.stringify(q);
  queuedAnswers.delete(qid);
}

function applySubmitSuccess(qid, body, res) {
  answered.add(qid);
  pState.responses.push({ id: 'local-' + qid, question_id: qid, participant_id: myId, body, is_pushed: 0 });
  if (res?.official_answers)
    Object.entries(res.official_answers).forEach(([id, a]) => official.set(id, a));
  drawParticipant();
  return !!res?.complete;
}

function sendResponse(qid, val) {
  const code = pState.session.room_code;
  getSocket().timeout(5000).emit('submit_response', { question_id: qid, body: val }, (err, res) => {
    if (err) { // socket down or server unreachable — hold it locally
      queuePut(code, qid, val);
      drawParticipant();
      toast('Offline — answer queued, sends when you reconnect', 'bg-amber-500');
      return;
    }
    if (res?.error) return toast('Submit failed', 'bg-rose-600');
    const complete = applySubmitSuccess(qid, val, res);
    toast(complete ? 'All answered — Official Answers unlocked'
      : res?.official_answers ? 'Stage complete — its Official Answers unlocked' : 'Submitted');
  });
}

function flushQueue() {
  const code = pState.session.room_code;
  const items = readQueue()[code] || [];
  queuedAnswers.clear();
  items.forEach(it => queuedAnswers.set(it.question_id, it.body));
  items.forEach(it => {
    // skip anything the server already has (e.g. flushed from another tab)
    if (pState.responses.some(r => r.participant_id === myId && r.question_id === it.question_id)) {
      queueRemove(code, it.question_id);
      return;
    }
    getSocket().timeout(5000).emit('submit_response', { question_id: it.question_id, body: it.body }, (err, res) => {
      if (err || res?.error) return; // still offline — stays queued for next rejoin
      queueRemove(code, it.question_id);
      applySubmitSuccess(it.question_id, it.body, res);
      toast('Queued answer delivered');
    });
  });
}

function bindCards() {
  app.querySelectorAll('[data-submit]').forEach(btn => btn.onclick = () => {
    const qid = btn.dataset.submit;
    const q = pState.questions.find(x => x.id === qid);
    let val;
    if (q.kind === 'multiple_choice') {
      val = app.querySelector(`input[name="${qid}"]:checked`)?.value;
      if (!val) return toast('Pick an option first', 'bg-amber-500');
    } else {
      val = $('#in-' + qid).value.trim();
      if (!val) return toast('Type an answer first', 'bg-amber-500');
    }
    sendResponse(qid, val);
  });
  app.querySelectorAll('[data-acc]').forEach(btn => btn.onclick = () => {
    const qid = btn.dataset.acc;
    if (!official.has(qid)) return toast(pState.session.stages?.length ? 'Locked until you finish this stage' : 'Locked until you answer every question', 'bg-amber-500');
    document.getElementById('acc-' + qid).classList.toggle('hidden');
  });
  app.querySelectorAll('[data-note]').forEach(ta => {
    ta.onchange = () => getSocket().emit('save_note', { question_id: ta.dataset.note, body: ta.value }, () => toast('Note saved', 'bg-amber-500'));
  });
}

      <div><label class="text-sm font-medium text-slate-300">Email</label>

      <div><label class="text-sm font-medium text-slate-300">Password ${login ? '' : '<span class="text-slate-500">(8+ characters)</span>'}</label>
        <input id="a-pass" type="password" class="mt-1 w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:border-amber-500 focus:outline-none"></div>

      <button id="a-go" class="tap w-full bg-rose-600 hover:bg-rose-500 rounded-xl py-3 font-bold">${login ? 'Log in' : 'Sign up'}</button>
      ${login ? `<p class="text-sm text-center"><a href="#/reset" class="text-slate-400 hover:text-slate-200 hover:underline">Forgot your password?</a></p>` : ''}
      <p class="text-sm text-slate-400 text-center">${login
        ? `No account? <a href="#/signup" class="text-amber-400 hover:underline">Sign up</a>`
        : `Already have one? <a href="#/login" class="text-amber-400 hover:underline">Log in</a>`}</p>
    </div>
  </main>`;
  const go = async () => {
    const payload = {
      email: $('#a-email').value.trim(),
      password: $('#a-pass').value,
      guest_token: token,
    };
    if (!login) payload.display_name = $('#a-name').value.trim();
    const res = await fetch(`/api/${login ? 'login' : 'signup'}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload),
    });
    const body = await res.json();
    if (!res.ok) { $('#a-err').textContent = body.error; $('#a-err').classList.remove('hidden'); return; }
    // login/signup responses lack role + department — fetch the full identity
    // so admin nav items (review queue, moderation) survive a fresh login
    me = await fetch('/api/me').then(r => r.json()).catch(() => body);
    renderNav();
    if (body.claimed_sessions > 0) toast(`Welcome, ${body.display_name} — ${body.claimed_sessions} past session${body.claimed_sessions > 1 ? 's' : ''} saved to your library`);
    else toast(`Welcome, ${body.display_name}`);
    if (!login) toast('Check your email to verify your address', 'bg-slate-700');
    location.hash = sessionStorage.authNext || '#/me';
    sessionStorage.removeItem('authNext');
  };
  $('#a-go').onclick = go;
  app.querySelectorAll('input').forEach(el => el.addEventListener('keydown', e => e.key === 'Enter' && go()));
  icons();
}

async function renderPublic() {

    fetch('/api/public/scenarios').then(r => r.json()),
    fetch('/api/objectives').then(r => r.json()).catch(() => []),

  const visible = () => list.filter(s => {
    if (st.cat && s.category !== st.cat) return false;

    if (st.diff && s.difficulty !== st.diff) return false;
    if (st.obj && s.objective_primary !== st.obj && s.objective_secondary !== st.obj) return false;

  const sel = 'tap w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm';

      </div>
    </div>
  </main>`;
  const drawGrid = () => {
    $('#pub-grid').innerHTML = visible().map(s => scenarioCard(s, {

      footer: `<button data-clone="${s.id}" class="tap p-2.5 text-slate-400 hover:text-white" title="Clone to my library"><i data-lucide="copy-plus" class="w-4 h-4"></i></button>

  app.querySelectorAll('[data-clone]').forEach(btn => btn.onclick = async () => {
    if (!me) { sessionStorage.authNext = location.hash; location.hash = '#/login'; return; }
    const r = await fetch(`/api/scenarios/${btn.dataset.clone}/clone`, { method: 'POST' });
    if (r.ok) { toast('Cloned to your private library'); location.hash = '#/library'; }
    else toast('Clone failed', 'bg-rose-600');
  });
  app.querySelectorAll('[data-report]').forEach(btn => btn.onclick = async () => {
    if (!me) { sessionStorage.authNext = location.hash; location.hash = '#/login'; return; }
    const reason = prompt('Why are you reporting this scenario? (unsafe practice, wrong information, spam…)');
    if (!reason?.trim()) return;
    const r = await fetch(`/api/scenarios/${btn.dataset.report}/report`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ reason }),
    });
    if (r.ok) toast('Reported — thank you');
    else toast((await r.json()).error, 'bg-amber-500');
  });
  }
}

    else toast('Delete failed', 'bg-rose-600');

    const i = +b.dataset.down; if (i >= entries.length - 1) return;

  app.querySelectorAll('[data-pub]').forEach(b => b.onclick = () => {
    const i = +b.dataset.pub; entries[i].published = !entries[i].published; save(true);
  });
  app.querySelectorAll('[data-rm]').forEach(b => b.onclick = () => {
    entries.splice(+b.dataset.rm, 1); save(true);
  });
}

async function renderSolo(scenarioId) {
  const params = new URLSearchParams(location.hash.split('?')[1] || '');
  const role = params.get('role') || '';
  const res = await fetch(`/api/scenarios/${scenarioId}`);
  if (!res.ok) { toast('Scenario not found', 'bg-rose-600'); location.hash = '#/public'; return; }
  const s = await res.json();
  // v7 stages: resolve blank stages (inherit previous) on the full list, then track-filter.
  let curStage = '';
  s.questions.forEach(q => { if (q.stage) curStage = q.stage; q.stage = curStage; });
  const stageNames = [...new Set(s.questions.map(q => q.stage).filter(Boolean))];
  const qs = s.questions.filter(q => !role || !q.role_track || q.role_track === role);
  if (!qs.length) { toast('No questions for this role', 'bg-amber-500'); location.hash = `#/scenario/${scenarioId}`; return; }
  // Solo advances stage-by-stage: later stages stay hidden until the player
  // finishes the current one (stageless scenarios show everything at once).
  const stageOf = q => Math.max(0, stageNames.indexOf(q.stage));
  const saved = {}; // question_id -> answer, held across stage re-renders
  let soloStage = 0;
  const lastStage = stageNames.length ? stageNames.length - 1 : 0;
  const draw = () => {
  const visible = stageNames.length ? qs.filter(q => stageOf(q) <= soloStage) : qs;
  app.innerHTML = `
  <main class="max-w-md mx-auto p-4 pb-24 space-y-4 anim-in">
    <header>
      <p class="text-xs font-bold text-rose-400 flex items-center gap-1.5"><i data-lucide="user" class="w-3.5 h-3.5"></i>SOLO RUN${role ? ` · <span class="text-amber-400">${esc(role)}</span>` : ''}</p>
      <h1 class="text-xl font-bold leading-tight">${esc(s.title)}</h1>
    </header>
    <p class="text-sm text-slate-300 whitespace-pre-wrap">${esc(s.description)}</p>
    ${!me ? `<div class="bg-amber-500/10 border border-amber-500/40 rounded-2xl px-4 py-3 text-xs text-amber-200">Playing as a guest — this run <b>won't be saved</b>.</div>` : ''}
    <div id="solo-cards" class="space-y-4">
    ${visible.map((q, i) => {
      const locked = stageNames.length && stageOf(q) < soloStage; // earlier stage, already committed
      return (q.stage && q.stage !== visible[i - 1]?.stage
        ? `<div class="flex items-center gap-3 pt-2"><span class="text-xs font-black tracking-widest text-amber-400">${esc(q.stage.toUpperCase())}</span><span class="flex-1 h-px bg-slate-700"></span></div>` : '')
      + `
      <div class="bg-slate-800 rounded-2xl p-4 space-y-3">
        <p class="font-semibold text-sm leading-snug"><span class="text-rose-400 font-bold">Q${i + 1}.</span> ${q.role_track ? `<span class="text-amber-400">${esc(q.role_track)}</span> · ` : ''}${esc(q.prompt)}</p>
        ${q.kind === 'multiple_choice'
          ? `<div class="space-y-2">${(q.choices || []).map(c => `
              <label class="tap flex items-center gap-3 bg-slate-900 border ${saved[q.id] === c ? 'border-amber-500' : 'border-slate-700'} rounded-xl px-4 py-3 cursor-pointer has-[:checked]:border-amber-500">
                <input type="radio" name="solo-${q.id}" value="${esc(c)}" ${locked ? 'disabled' : ''} ${saved[q.id] === c ? 'checked' : ''} class="accent-rose-600 w-5 h-5"><span class="text-sm">${esc(c)}</span></label>`).join('')}</div>`
          : `<textarea data-solo="${q.id}" rows="3" ${locked ? 'disabled' : ''} placeholder="Type your answer…" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:border-amber-500 focus:outline-none disabled:opacity-60">${esc(saved[q.id] ?? '')}</textarea>`}
        <div class="flex items-center gap-2 text-xs text-slate-500"><i data-lucide="lock" class="w-3.5 h-3.5"></i>Official answer unlocks when you submit the full run</div>
      </div>`;
    }).join('')}
    </div>
    <button id="solo-submit" class="tap w-full bg-rose-600 hover:bg-rose-500 rounded-xl py-3.5 font-bold">${stageNames.length && soloStage < lastStage
      ? `Continue — next stage: “${esc(stageNames[soloStage + 1])}”` : 'Submit Run — Reveal Official Answers'}</button>
  </main>`;
  icons();
  const answerOf = q => q.kind === 'multiple_choice'
    ? app.querySelector(`input[name="solo-${q.id}"]:checked`)?.value ?? ''
    : app.querySelector(`[data-solo="${q.id}"]`)?.value.trim() ?? '';
  $('#solo-submit').onclick = async () => {
    visible.filter(q => stageOf(q) === soloStage || !stageNames.length).forEach(q => { saved[q.id] = answerOf(q); });
    const current = stageNames.length ? qs.filter(q => stageOf(q) === soloStage) : qs;
    if (current.some(q => !saved[q.id])) return toast(stageNames.length ? 'Answer every question in this stage first' : 'Answer every question first — no partial reveals', 'bg-amber-500');
    if (stageNames.length && soloStage < lastStage) { soloStage++; draw(); window.scrollTo(0, document.body.scrollHeight); return; }
    const answers = Object.fromEntries(qs.map(q => [q.id, saved[q.id]]));
    const btn = $('#solo-submit'); btn.disabled = true; btn.textContent = 'Submitting…';
    if (me) {
      const run = await fetch('/api/solo/runs', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ scenario_id: s.id, role_track: role }),
      }).then(r => r.ok ? r.json() : null);
      let last = null;
      if (run) for (const q of qs) {
        last = await fetch(`/api/solo/runs/${run.run_id}/answers`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question_id: q.id, body: answers[q.id] }),
        }).then(r => r.ok ? r.json() : null);
      }
      if (!run || !last?.complete) { toast('Could not save the run', 'bg-rose-600'); btn.disabled = false; btn.textContent = 'Submit Run — Reveal Official Answers'; return; }
      toast('Run saved to your library');
      location.hash = `#/session/${run.run_id}`;
      return;
    }
    const r = await fetch(`/api/scenarios/${s.id}/solo-reveal`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ answers, role_track: role }),
    });
    if (!r.ok) { toast('Submit failed', 'bg-rose-600'); btn.disabled = false; btn.textContent = 'Submit Run — Reveal Official Answers'; return; }
    const { official_answers } = await r.json();
    soloReveal(s, qs, answers, official_answers, role);
  };
  }; // draw
  draw();
}

async function renderSessionDetail(id) {
  if (!me) { sessionStorage.authNext = `#/session/${id}`; location.hash = '#/login'; return; }
  const res = await fetch(`/api/me/sessions/${id}`);
  if (!res.ok) { toast('Session not found', 'bg-rose-600'); location.hash = '#/me'; return; }
  const { session, questions, responses, notes, media, my_participant_id,
          analysis, analysis_available, my_debrief } = await res.json();
  const isHost = session.host_id === me.id;
  const assessFor = rid => analysis?.assessments?.find(a => a.response_id === rid);
  const badge = c => c === 'review'
    ? `<span class="text-xs font-bold px-2 py-0.5 rounded-full bg-amber-500/20 text-amber-300">⚠ REVIEW</span>`
    : c === 'aligned'
      ? `<span class="text-xs font-bold px-2 py-0.5 rounded-full bg-emerald-500/20 text-emerald-300">ALIGNED</span>`
      : `<span class="text-xs font-bold px-2 py-0.5 rounded-full bg-slate-600/50 text-slate-300">DIVERGENT</span>`;
  app.innerHTML = `
  <main class="max-w-2xl mx-auto p-4 sm:p-6 space-y-4 anim-in pb-16">
    <a href="#/me" class="text-sm text-slate-400 hover:text-white flex items-center gap-1"><i data-lucide="arrow-left" class="w-4 h-4"></i>My Sessions</a>
    <div class="bg-slate-800 rounded-2xl p-5 flex items-start justify-between gap-3 flex-wrap">
      <div class="min-w-0">
        <h1 class="font-bold text-lg">${esc(session.title)}</h1>
        <p class="text-sm text-slate-400 mt-1">${esc(session.category)} · ${esc(session.subcategory)} · ${session.mode === 'solo' ? '<span class="text-rose-400 font-semibold">solo run</span>' : `room ${esc(session.room_code)}`} · ${esc(session.started_at)}</p>
      </div>
      <a href="/api/me/sessions/${esc(session.id)}/pdf" class="tap flex items-center gap-2 bg-rose-600 hover:bg-rose-500 rounded-xl px-4 py-2.5 font-bold text-sm shrink-0">
        <i data-lucide="file-down" class="w-4 h-4"></i>Download PDF</a>
    </div>
    ${media?.length ? `<div class="-mx-4">${mediaStrip(media, session.image_url)}</div>` : ''}
    <div class="bg-rose-950/50 border border-rose-800/50 rounded-xl p-4 text-sm text-rose-100">
      <p class="font-bold text-rose-300 mb-1">DISPATCH</p>${esc(session.description)}
    </div>
    ${my_debrief ? `
    <div class="bg-indigo-950/40 border border-indigo-800/60 rounded-2xl p-4 space-y-2">
      <p class="text-xs font-bold text-indigo-300 flex items-center gap-1.5"><i data-lucide="clipboard-check" class="w-4 h-4"></i>INSTRUCTOR DEBRIEF</p>
      <p class="text-sm text-indigo-100 whitespace-pre-wrap">${esc(my_debrief.body)}</p>
    </div>` : ''}
    ${isHost && session.status === 'ended' && (analysis_available || analysis) ? `
    <div class="bg-slate-800 rounded-2xl p-4 space-y-3">
      <div class="flex items-center justify-between gap-2 flex-wrap">
        <p class="font-semibold flex items-center gap-2 text-sm"><i data-lucide="sparkles" class="w-4 h-4 text-indigo-400"></i>AI After-Action <span class="text-xs text-slate-500 font-normal">advisory — you review before crew see anything</span></p>
        ${!analysis ? `<button id="aa-gen" class="tap text-sm bg-indigo-600 hover:bg-indigo-500 rounded-xl px-4 py-2 font-semibold">Generate</button>`
          : analysis.debriefs.some(d => !d.shared_at)
            ? `<button id="aa-share" class="tap text-sm bg-emerald-600 hover:bg-emerald-500 rounded-xl px-4 py-2 font-semibold">Share all debriefs</button>`
            : `<span class="text-xs font-semibold text-emerald-400">Debriefs shared</span>`}
      </div>
      ${analysis ? `
      <div class="bg-slate-900 rounded-xl px-4 py-3 text-sm"><p class="text-xs font-bold text-slate-500 mb-1">CREW SUMMARY</p>${esc(analysis.crew_summary)}</div>
      <div class="space-y-2">
        ${analysis.debriefs.map(d => `
        <div class="bg-slate-900 rounded-xl px-4 py-3 text-sm space-y-2" data-debrief="${esc(d.id)}">
          <div class="flex items-center justify-between gap-2">
            <p class="text-xs font-bold text-slate-400">${esc(d.display_tag)} ${d.shared_at ? '<span class="text-emerald-400">· shared</span>' : '<span class="text-amber-400">· draft</span>'}</p>
            ${!d.shared_at ? `<button data-edit-debrief="${esc(d.id)}" class="tap text-xs text-slate-400 hover:text-white flex items-center gap-1"><i data-lucide="pencil" class="w-3.5 h-3.5"></i>Edit</button>` : ''}
          </div>
          <p class="whitespace-pre-wrap" data-debrief-body>${esc(d.body)}</p>
        </div>`).join('')}
      </div>` : `<p class="text-sm text-slate-500 italic">No analysis yet — generate one from the crew's answers.</p>`}
    </div>` : ''}
    ${questions.map((qn, i) => {
      const mineResp = responses.find(r => r.question_id === qn.id && r.participant_id === my_participant_id);
      const pushed = responses.filter(r => r.question_id === qn.id && r.is_pushed);
      const note = notes.find(n => n.question_id === qn.id);
      return `<div class="bg-slate-800 rounded-2xl p-4 space-y-3">
        <p class="font-semibold text-sm"><span class="text-rose-400 font-bold">Q${i + 1}.</span> ${qn.role_track ? `<span class="text-amber-400">${esc(qn.role_track)}</span> · ` : ''}${esc(qn.prompt)}</p>
        ${mineResp ? `<div class="bg-slate-900 rounded-xl px-4 py-3 text-sm"><p class="text-xs font-bold text-slate-500 mb-1">YOUR ANSWER</p>${esc(mineResp.body)}</div>` : ''}
        ${isHost && analysis ? responses.filter(r => r.question_id === qn.id).map(r => {
          const a = assessFor(r.id);
          return `<div class="bg-slate-900 rounded-xl px-4 py-3 text-sm space-y-1 ${a?.classification === 'review' ? 'border border-amber-500/40' : ''}">
            <div class="flex items-center justify-between gap-2"><p class="text-xs font-bold text-slate-500">${esc(r.display_tag)}${r.role_track ? ` · <span class="text-amber-400">${esc(r.role_track)}</span>` : ''}</p>${a ? badge(a.classification) : ''}</div>
            <p>${esc(r.body)}</p>
            ${a ? `<p class="text-xs text-slate-400 italic">${esc(a.rationale)}</p>` : ''}
          </div>`;
        }).join('') : ''}
        ${pushed.map(p => `<div class="bg-slate-900 border-l-4 border-rose-500 rounded-lg px-3 py-2.5 text-sm"><p class="text-xs font-bold text-rose-400 mb-0.5">PUSHED · ${esc(p.display_tag)}</p>${esc(p.body)}</div>`).join('')}
        ${qn.instructor_answer != null ? `<div class="bg-emerald-950/40 border border-emerald-900 rounded-xl px-4 py-3 text-sm text-emerald-100"><p class="text-xs font-bold text-emerald-400 mb-1">OFFICIAL ANSWER</p>${esc(qn.instructor_answer)}</div>` : ''}
        ${note ? `<div class="bg-amber-950/30 border border-amber-800/50 rounded-xl px-4 py-3 text-sm"><p class="text-xs font-bold text-amber-400 mb-1">YOUR NOTES</p>${esc(note.body)}</div>` : ''}
      </div>`;
    }).join('')}
  </main>`;
  icons();
  const gen = $('#aa-gen');
  if (gen) gen.onclick = async () => {
    gen.disabled = true; gen.textContent = 'Analyzing…';
    const r = await fetch(`/api/me/sessions/${session.id}/analysis`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
    if (r.ok) { toast('After-action ready — review the drafts'); renderSessionDetail(id); }
    else { toast((await r.json()).error, 'bg-rose-600'); gen.disabled = false; gen.textContent = 'Generate'; }
  };
  const shareBtn = $('#aa-share');
  if (shareBtn) shareBtn.onclick = async () => {
    if (!confirm('Share all draft debriefs with their participants? They will see the current text.')) return;
    const r = await fetch(`/api/me/sessions/${session.id}/debriefs/share`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
    if (r.ok) { toast('Debriefs shared with the crew'); renderSessionDetail(id); }
    else toast('Share failed', 'bg-rose-600');
  };
  app.querySelectorAll('[data-edit-debrief]').forEach(btn => btn.onclick = async () => {
    const card = btn.closest('[data-debrief]');
    const current = card.querySelector('[data-debrief-body]').textContent;
    const next = prompt('Edit this debrief (the participant will see exactly this):', current);
    if (next == null || !next.trim() || next === current) return;
    const r = await fetch(`/api/me/sessions/${session.id}/debriefs/${btn.dataset.editDebrief}`, {
      method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ body: next.trim() }) });
    if (r.ok) { toast('Debrief updated'); renderSessionDetail(id); }
    else toast('Update failed', 'bg-rose-600');
  });
}

function bindLaunchButtons() {

      <div>
        <h1 class="text-2xl font-bold">Review Queue</h1>
        <p class="text-sm text-slate-400">${me.role === 'site_admin' ? 'All scenarios submitted for official review' : `Scenarios submitted by ${esc(me.department?.name ?? 'your department')} members`}</p>
      </div>
    </div>
    ${queue.map(s => `
    <div class="bg-slate-800 rounded-2xl p-4 space-y-3">
      <div class="flex items-start gap-3">
        <div class="flex-1 min-w-0">
          <p class="font-bold">${esc(s.title)}</p>
          <p class="text-sm text-slate-400">${esc(s.category)} · ${esc(s.subcategory)}${s.difficulty ? ' · ' + esc(s.difficulty) : ''}${s.objective_primary ? ' · ' + esc(s.objective_primary) : ''}</p>
        </div>
        <span class="text-xs font-semibold px-2.5 py-1 rounded-full bg-slate-700 text-slate-300 shrink-0">${esc(s.visibility)}</span>
      </div>
      ${s.description ? `<p class="text-sm text-slate-300 leading-relaxed line-clamp-3">${esc(s.description)}</p>`
        : `<p class="text-sm text-amber-400/80 italic">No dispatch description — add one in Review &amp; Edit.</p>`}
      <div class="flex items-center justify-between gap-3 pt-1">
        <p class="text-xs text-slate-500 min-w-0 truncate">by ${esc(s.author_name ?? 'unknown')} · ${s.question_count} questions · ${new Date(s.submitted_at + 'Z').toLocaleDateString()}</p>
        <a href="#/create/${s.id}" class="tap bg-sky-600 hover:bg-sky-500 rounded-xl px-4 py-2 font-bold text-sm shrink-0">Review &amp; Edit</a>
      </div>
    </div>`).join('') || `
    <div class="bg-slate-800 rounded-2xl p-8 text-center space-y-2">
      <i data-lucide="check-circle-2" class="w-8 h-8 text-emerald-400 mx-auto"></i>
      <p class="font-semibold">Queue is clear</p>
      <p class="text-sm text-slate-400">When an instructor submits a scenario for official review, it lands here.</p>
    </div>`}
  </main>`;
  icons();
}

async function renderModeration() {
  if (!me || me.role !== 'site_admin') { location.hash = '#/'; return; }
  const [reports, pendingDepts] = await Promise.all([
    fetch('/api/moderation/reports').then(r => r.json()),
    fetch('/api/moderation/departments').then(r => r.json()),
  ]);
  app.innerHTML = `
  <main class="max-w-2xl mx-auto p-4 sm:p-6 space-y-4 anim-in">
    <h1 class="text-2xl font-bold flex items-center gap-2"><i data-lucide="shield-alert" class="w-6 h-6 text-rose-400"></i>Moderation Queue</h1>

    <h2 class="font-semibold flex items-center gap-2 pt-1"><i data-lucide="graduation-cap" class="w-4 h-4 text-indigo-400"></i>Learning Objectives</h2>
    <div class="bg-slate-800 rounded-2xl p-4 space-y-2">
      <p class="text-sm text-slate-400">The controlled vocabulary authors tag scenarios with. Additions are permanent — keep it curated.</p>
      <div class="flex gap-2">
        <input id="obj-name" placeholder="New objective, e.g. Salvage & Overhaul" class="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-sm focus:border-indigo-500 focus:outline-none">
        <button id="obj-add" class="tap text-sm bg-indigo-600 hover:bg-indigo-500 rounded-xl px-4 py-2.5 font-semibold">Add</button>
      </div>
    </div>

    <h2 class="font-semibold flex items-center gap-2 pt-1"><i data-lucide="building-2" class="w-4 h-4 text-amber-400"></i>Pending Departments</h2>
    ${pendingDepts.map(d => `
    <div class="bg-slate-800 rounded-2xl p-4 space-y-2">
      <div class="flex items-center justify-between gap-2">
        <p class="font-bold truncate">${esc(d.name)}</p>
        <span class="text-xs text-slate-500 shrink-0">${d.member_count} member${d.member_count === 1 ? '' : 's'}</span>
      </div>
      <p class="text-sm text-slate-400">requested by ${esc(d.creator_name ?? 'unknown')} (${esc(d.creator_email ?? '—')}) · ${esc(d.created_at)}</p>
      <div class="flex gap-2">
        <button data-dept="${d.id}" data-daction="reject" class="tap flex-1 text-sm bg-slate-700 hover:bg-slate-600 rounded-xl py-2.5 font-semibold">Reject</button>
        <button data-dept="${d.id}" data-daction="approve" class="tap flex-1 text-sm bg-emerald-600 hover:bg-emerald-500 rounded-xl py-2.5 font-bold">Approve</button>
      </div>
    </div>`).join('') || '<p class="text-sm text-slate-500 italic">No departments awaiting approval.</p>'}

    <h2 class="font-semibold flex items-center gap-2 pt-2"><i data-lucide="flag" class="w-4 h-4 text-rose-400"></i>Reported Scenarios</h2>
    ${reports.map(r => `
    <div class="bg-slate-800 rounded-2xl p-4 space-y-2">
      <div class="flex items-center justify-between gap-2">
        <p class="font-bold truncate">${esc(r.title)}</p>
        <span class="text-xs text-slate-500 shrink-0">${r.open_reports} open report${r.open_reports > 1 ? 's' : ''}</span>
      </div>
      <p class="text-sm text-slate-400">by ${esc(r.author_name ?? 'unknown')} · reported ${esc(r.created_at)}</p>
      <p class="text-sm bg-slate-900 rounded-xl px-3 py-2">"${esc(r.reason)}"</p>
      <div class="flex gap-2">
        <button data-resolve="${r.id}" data-action="dismiss" class="tap flex-1 text-sm bg-slate-700 hover:bg-slate-600 rounded-xl py-2.5 font-semibold">Dismiss</button>
        <button data-resolve="${r.id}" data-action="unlist" class="tap flex-1 text-sm bg-rose-700 hover:bg-rose-600 rounded-xl py-2.5 font-bold">Unlist Scenario</button>
      </div>
    </div>`).join('') || '<p class="text-slate-500 italic">Queue is empty. All quiet.</p>'}
  </main>`;
  icons();
  $('#obj-add').onclick = async () => {
    const name = $('#obj-name').value.trim();
    if (!name) return toast('Type an objective name first', 'bg-amber-500');
    const r = await fetch('/api/objectives', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name }),
    });
    if (r.ok) { toast(`"${name}" added to the vocabulary`); $('#obj-name').value = ''; }
    else toast('Could not add objective', 'bg-rose-600');
  };
  app.querySelectorAll('[data-resolve]').forEach(btn => btn.onclick = async () => {
    await fetch(`/api/moderation/reports/${btn.dataset.resolve}/resolve`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: btn.dataset.action }),
    });
    toast(btn.dataset.action === 'unlist' ? 'Scenario unlisted' : 'Report dismissed');
    renderModeration();
  });
  app.querySelectorAll('[data-dept]').forEach(btn => btn.onclick = async () => {
    if (btn.dataset.daction === 'reject' &&
        !confirm('Reject this department? It will be deleted and its creator reset to a standard member.')) return;
    const r = await fetch(`/api/moderation/departments/${btn.dataset.dept}/${btn.dataset.daction}`, { method: 'POST' });
    if (r.ok) toast(btn.dataset.daction === 'approve' ? 'Department approved' : 'Department rejected');
    else toast((await r.json()).error, 'bg-rose-600');
    renderModeration();
  });
}

async function refreshMe() {
  me = await fetch('/api/me').then(r => r.json()).catch(() => null);
  renderNav();
}

async function boot() {
  me = await fetch('/api/me').then(r => r.json()).catch(() => null);
  renderNav();
  route();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
}
boot();
</script>
</body>
</html>
